global:
  scrape_interval: 15s
  scrape_timeout:   5s

scrape_configs:

  - job_name: prometheus
    static_configs:
    - targets: ["10.3.18.65:9091"]
      labels: 
       instance: prometheus

  - job_name: nginx
    static_configs:
    - targets: ["10.3.18.65:9113"]
      labels: 
       instance: nginx-exporter

  - job_name: postgres
    static_configs:
    - targets: ["10.3.18.65:9187"]
      labels: 
       instance: postgres-exporter

  - job_name: snmp
    static_configs:
    - targets: ["10.3.18.65:9116"]
      labels: 
       instance: snmp-exporter