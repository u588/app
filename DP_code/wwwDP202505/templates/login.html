<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
</head>
<style>
    #round{
        width: 400px;
        height: 200px;
        margin: 0 auto;
    }
    table{width: 300px;
        height: 50px;
        margin: 20% auto;
        }


</style>
<body>
    <form action="{{ url_for('login') }}" method="post">
        <table>
            <tbody>
                <tr>
                    <td>用户名:</td>
                    <td><input type="text" placeholder="请输入用户名" name="username"></td>
                </tr>
                <tr>
                    <td>密码:</td>
                    <td><input type="password" placeholder="请输入密码" name="password"></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="登陆"></td>
                </tr>
                <tr>
                    <td></td>
                    <td>{{msg}}</td>
                </tr>

            </tbody>

        </table>

    </form>
</body>
</html>
