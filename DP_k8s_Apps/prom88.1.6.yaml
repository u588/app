apiVersion: apps/v1
kind: Deployment
metadata:
  name: prom-deployment
spec:
  selector:
    matchLabels:
      app: prom
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: prom
    spec:
      containers:
      - name: prom
        image: 10.3.18.60/docker/prometheus:latest
        ports:
        - containerPort: 9090


---
apiVersion: v1
kind: Service
metadata:
   name: prom-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.1.6
   selector:
      app: prom
   ports:
   - name: prom-port
     protocol: TCP
     port: 9090
     targetPort: 9090