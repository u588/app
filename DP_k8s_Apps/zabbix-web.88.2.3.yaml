apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web-deployment
spec:
  selector:
    matchLabels:
      app: zabbix-web
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
      - name: zabbix-web
        image: docker.m.daocloud.io/zabbix/zabbix-web-service:latest
        env:
          - name: ZBX_ALLOWEDIP
            value: "10.88.2.2"
          # - name: POSTGRES_USER
          #   value: 'sa'
          # - name:  POSTGRES_PASSWORD
          #   value: '11111111'
          # - name: PGADMIN_CONFIG_LOGIN_BANNER
          #   value: "Authorised users only!"
          # - name: PGADMIN_CONFIG_CONSOLE_LOG_LEVEL
          #   value: '10'
        ports:
          - containerPort: 10053
---
apiVersion: v1
kind: Service
metadata:
   name: zabbix-web-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.2.3
   selector:
      app: zabbix-web
   ports:
   - name: zabbix-web-http
     protocol: TCP
     port: 10053
     targetPort: 10053
