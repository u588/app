apiVersion: apps/v1
kind: Deployment
metadata:
  name: testuwsgi-deployment
spec:
  selector:
    matchLabels:
      app: testuwsgi
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: testuwsgi
    spec:
      containers:
      - name: testuwsgi
        image: 10.3.18.63/docker/tdx-uwsgi:v1
        ports:
        - containerPort: 3031
        volumeMounts:
        - mountPath: /home 
          name: uhome

      volumes:
      - name: uhome
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/www
          readOnly: true
      
---
apiVersion: v1
kind: Service
metadata:
   name: testuwsgi-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.8.9
   selector:
      app: testuwsgi
   ports:
   - name: testuwsgi-server
     protocol: TCP
     port: 3031
     targetPort: 3031