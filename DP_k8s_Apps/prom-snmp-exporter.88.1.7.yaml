apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter-deployment
spec:
  selector:
    matchLabels:
      app: snmp-exporter
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      containers:
      - name: snmp-exporter
        image: 10.3.18.60/docker/snmp-exporter:latest
        ports:
        - containerPort: 9116


---
apiVersion: v1
kind: Service
metadata:
   name: snmp-exporter-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.1.7
   selector:
      app: snmp-exporter
   ports:
   - name: snmp-exporter-port
     protocol: TCP
     port: 9116
     targetPort: 9116