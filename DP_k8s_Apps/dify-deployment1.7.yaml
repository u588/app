# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: dify
---
# Dify Credentials
apiVersion: v1
kind: Secret
metadata:
  name: dify-credentials
  namespace: dify
data:
  # Base64 encoded postgres username, default is postgres
  pg-username: c2E=
  # Base64 encoded postgres password, default is difyai123456
  pg-password: MTExMTExMTE=
  # Base64 encoded postgres host, default is dify-pg
  pg-host: MTAuMTQ1LjI1NC41Ng==
  # Base64 encoded postgres port 5432
  pg-port: NTQzMg==
  # Base64 encoded redis username, default is empty
  redis-username: ""
  # Base64 encoded redis password, default is difyai123456
  redis-password: ZGlmeWFpMTIzNDU2
  # Base64 encoded redis host, default is dify-redis
  redis-host: ZGlmeS1yZWRpcw==
  # Base64 encoded redis port 6379
  redis-port: NjM3OQ==
  # Base64 encoded weaviate host, default is dify-weaviate
  pgvector-host: MTAuMTQ1LjI1NC41Ng==
  # Base64 encoded weaviate port 8080
  pgvector-port: NTQzMg==
type: Opaque


---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: dify-redis
  name: dify-redis
  namespace: dify
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/instance: dify-redis
  name: dify-redis
  namespace: dify
rules:
- apiGroups:
  - "*"
  resources:
  - "*"
  verbs:
  - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: dify-redis
  name: dify-redis
  namespace: dify
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dify-redis
subjects:
- kind: ServiceAccount
  name: dify-redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dify-redis
  namespace: dify
spec:
  selector:
    matchLabels:
      app: dify-redis # has to match .spec.template.metadata.labels
  serviceName: "dify-redis"
  replicas: 1 # by default is 1
  template:
    metadata:
      labels:
        app: dify-redis # has to match .spec.selector.matchLabels
    spec:
      terminationGracePeriodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: dify-redis
      containers:
      - name: dify-redis
        image: 10.3.18.60/docker/dify-redis:6-alpine
        ports:
        - containerPort: 6379
          name: redis-p
        command: ["redis-server", "--save", "20", "1", "--loglevel", "warning", "--requirepass", "$(REDIS_PASSWORD)"]
        resources:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 100m
            memory: 102Mi
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: redis-password
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        hostPath:
          path: /home/dify/db/redis/data
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: dify-redis
  namespace: dify
spec:
  selector:
    app: dify-redis
  type: ClusterIP
  clusterIP: None
  ports:
  - name: redis
    protocol: TCP
    port: 6379
    targetPort: 6379

# Redis Server End


# Dify Sandbox Server Start

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-sandbox
  namespace: dify
  labels:
    app: dify-sandbox
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: dify-sandbox
  template:
    metadata:
      labels:
        app: dify-sandbox
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: dify-sandbox
        image: 10.3.18.60/docker/dify-sandbox:0.2.1
        env:
        - name: API_KEY
          value: "dify-sandbox"
        - name: GIN_MODE
          value: release
        - name: WORKER_TIMEOUT
          value: "15"
        - name: ENABLE_NETWORK
          value: "true"
        - name: SANDBOX_PORT
          value: "8194"
          # uncomment if you want to use proxy
          # - name: HTTP_PROXY
          #   value: 'http://ssrf-proxy:3128'
          # - name: HTTPS_PROXY
          #   value: 'http://ssrf-proxy:3128'
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 1Gi
        ports:
        - containerPort: 8194
        imagePullPolicy: IfNotPresent

---
apiVersion: v1
kind: Service
metadata:
  name: dify-sandbox
  namespace: dify
spec:
  ports:
  - port: 8194
    targetPort: 8194
    protocol: TCP
    name: dify-sandbox
  type: ClusterIP
  clusterIP: None
  selector:
    app: dify-sandbox

# Dify Sandbox Server End

# Dify API Server End
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dify-api
  labels:
    app.kubernetes.io/instance: dify-api
    app: dify-api
  namespace: dify
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: dify-api
  selector:
    matchLabels:
      app: dify-api
  template:
    metadata:
      labels:
        app: dify-api
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
      - name: dify-api-storage
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/dify
          readOnly: false 
        # hostPath:
        #   path: /root/dify/app/api/storage
        #   type: DirectoryOrCreate
      containers:
      - name: dify-api
        image: 10.3.18.60/docker/dify-api:latest
        env:
        - name: MODE
          value: api
        - name: LOG_LEVEL
          value: INFO
        - name: SECRET_KEY
          value: "sk-9f73s3ljTXVcMT3Blb3ljTqtsKiGHXVcMT3BlbkFJLK7U"
        - name: CONSOLE_WEB_URL
          value: ""
        - name: INIT_PASSWORD
          value: password
        - name: CONSOLE_API_URL
          value: ""
        - name: SERVICE_API_URL
          value: ""
        - name: APP_WEB_URL
          value: ""
        - name: FILES_URL
          value: ""
        - name: MIGRATION_ENABLED
          value: "true"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: pg-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: pg-password
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: pg-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: pg-port
        - name: DB_DATABASE
          value: dify
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: redis-port
              # default redis username is empty
        - name: REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: redis-username
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: redis-password
        - name: REDIS_USE_SSL
          value: "false"
        - name: REDIS_DB
          value: "0"
        - name: CELERY_BROKER_URL
          value: >-
            redis://$(REDIS_USERNAME):$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/1
        - name: WEB_API_CORS_ALLOW_ORIGINS
          value: "*"
        - name: CONSOLE_CORS_ALLOW_ORIGINS
          value: "*"
        - name: STORAGE_TYPE
          value: "*"
        - name: STORAGE_LOCAL_PATH
          value: /app/api/storage
        - name: VECTOR_STORE
          value: pgvector
        - name: PGVECTOR_HOST
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: pgvector-host
        - name: PGVECTOR_PORT
          valueFrom:
            secretKeyRef:
              name: dify-credentials
              key: pgvector-port
        - name: PGVECTOR_DATABASE
          value: dify
        - name: PGVECTOR_USER
          value: sa
        - name: PGVECTOR_PASSWORD
          value: '11111111'
          # uncommect to enable SSRF
          # - name: SSRF_PROXY_HTTP_URL
          #   value: 'http://ssrf-proxy:3128'
          # - name: SSRF_PROXY_HTTPS_URL
          #   value: 'http://ssrf-proxy:3128'
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        ports:
        - containerPort: 5001

        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: dify-api-storage
          mountPath: /app/api/storage
---
apiVersion: v1
kind: Service
metadata:
  name: dify-api
  namespace: dify
spec:
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: dify-api
  type: ClusterIP
  selector:
    app: dify-api

