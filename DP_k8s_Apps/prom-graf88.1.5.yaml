apiVersion: apps/v1
kind: Deployment
metadata:
  name: graf-deployment
spec:
  selector:
    matchLabels:
      app: graf
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: graf
    spec:
      containers:
      - name: graf
        # image: 10.3.18.60/docker/grafana:latest
        image: 10.3.18.60/docker/grafana-enterprise:latest
        ports:
        - containerPort: 3000


---
apiVersion: v1
kind: Service
metadata:
   name: graf-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.1.5
   selector:
      app: graf
   ports:
   - name: graf-port
     protocol: TCP
     port: 80
     targetPort: 3000