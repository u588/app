# ==================== 宏观指标映射配置 ====================
macro_indicators:
  brent_crude:
    code: "OIL"
    source: "external"
    unit: "USD/barrel"
    normal_range: [70, 90]
  
  comex_gold:
    code: "GC"
    source: "external"
    unit: "USD/oz"
    normal_range: [1800, 2500]
  
  lme_copper:
    code: "CAD"
    source: "external"
    unit: "USD/ton"
    normal_range: [8000, 11000]
  
  nymex_gas:
    code: "NG"
    source: "external"
    unit: "USD/MMBtu"
    normal_range: [2.0, 4.0]
  
  usd_cny:
    code: "5_RMBUS"
    source: "tdx"
    unit: "CNY/USD"
    normal_range: [6.8, 7.4]
  
  china_10y_bond:
    code: "5_CNTY"
    source: "tdx"
    unit: "%"
    normal_range: [2.0, 3.5]
  
  pmi:
    code: "3_PMI"
    source: "tdx"
    unit: "index"
    normal_range: [48, 52]
  
  m2_growth:
    code: "5_M2"
    source: "tdx"
    unit: "%"
    normal_range: [8, 12]
  
  cpi:
    code: "2_CPI"
    source: "tdx"
    unit: "%"
    normal_range: [1, 3]
  
  ppi:
    code: "2_PPI"
    source: "tdx"
    unit: "%"
    normal_range: [-2, 5]