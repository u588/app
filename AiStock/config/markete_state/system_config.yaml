# ==================== 风险阈值 ====================
risk_thresholds:
  pcr:
    warning_high: 1.3
    warning_low: 0.7
    extreme_high: 1.5
    extreme_low: 0.5
    ma_window: 5
  basis:
    warning: -1.5
    extreme: -2.0
    ma_window: 10
  valuation:
    overvalued_pe_percentile: 75
    undervalued_pe_percentile: 25
  volatility:
    warning_expansion: 1.8
    extreme_expansion: 2.5
    ma_window: 60
  liquidity:
    warning_shrink: 0.6
    extreme_shrink: 0.4
    ma_window: 5

# ==================== 宏观指标配置 ====================
macro_indicators:
  inflation:
    enabled: true
    weight: 0.20
    indicators:
      CPI:
        code: "2_CPI"
        market_type: "macro"
        direction: "negative"
        thresholds:
          warning_high: 3.0
          warning_low: -1.0
      PPI:
        code: "2_PPI"
        market_type: "macro"
        direction: "neutral"
        thresholds:
          warning_high: 5.0
          warning_low: -3.0
  growth:
    enabled: true
    weight: 0.25
    indicators:
      GDP:
        code: "1_GDPI"
        market_type: "macro"
        direction: "positive"
        thresholds:
          warning_high: 6.0
          warning_low: 4.0
  liquidity:
    enabled: true
    weight: 0.25
    indicators:
      shibor_3m:
        code: "5_SHS3M"
        market_type: "macro"
        direction: "negative"
        thresholds:
          warning_high: 3.5
          warning_low: 1.5
  external_risk:
    enabled: true
    weight: 0.15
    indicators:
      us_10y_yield:
        code: "8_ATY"
        market_type: "macro"
        direction: "negative"
        thresholds:
          warning_high: 4.5
          warning_low: 3.0
      usd_cny:
        code: "5_RMBUS"
        market_type: "macro"
        direction: "negative"
        thresholds:
          warning_high: 7.3
          warning_low: 6.5

# ==================== 跨市场配置 ====================
cross_market:
  enabled: true
  markets:
    a_share:
      code: "000300"
      market_type: "index_zz"
    hk_share:
      code: "HSI"
      market_type: "index_xg"
    us_share:
      code: "SPXD"
      market_type: "macro"
  correlation_window: 60

# ==================== 输出配置 ====================
output:
  analysis_dir: "./output/analysis_results"
  visualization_dir: "./output/visualization"
  export_format: ["json", "csv"]
  alert_channels: ["log"]

# ==================== 可视化配置 ====================
visualization:
  enabled: true
  chinese_font: "Noto Sans SC, SimHei, sans-serif"
  chart_height: 600
  chart_width: 1200
  export_format: ["html", "png"]
  color_palette:
    primary: "#3498db"
    success: "#27ae60"
    warning: "#f39c12"
    danger: "#e74c3c"
    info: "#9b59b6"

version:
  system_version: "7.0.0"
  config_version: "1.0.0"
  last_updated: "2026-05-21"
  notes: "V7: 模块解耦 + 3D市场状态模型 + 动态合约 + 配置驱动"
