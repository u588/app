# ============================================
# A股市场状态量化系统 V7.0
# 系统配置文件
# ============================================

# ==================== 系统级配置 ====================
system:
  version: "7.0.0"
  name: "市场状态量化系统"
  mode: "production"          # production / development / backtest
  base_date: null             # null=使用今天
  log_level: "INFO"
  max_workers: 5
  data_min_days: 500
  degradation_mode: "auto"    # TDX不可用时自动降级到数据库

# ==================== 数据源配置 ====================
tdx:
  exhq_host: "47.112.95.207"
  exhq_port: 7720
  hq_host: "180.153.18.170"
  hq_port: 7709
  use_tdx: true
  timeout: 30
  retry_count: 3
  parallel_workers: 5

# ==================== 缓存配置 ====================
cache:
  max_size: 1000
  ttl: 3600
  stock_ttl: 7200
  index_ttl: 7200
  derivative_ttl: 1800
  macro_ttl: 3600
  pe_ttl: 86400

# ==================== 合约动态推导 ====================
contract_manager:
  enabled: true
  code_table_path: "./data/tdx_code_table.xlsx"
  auto_rollover: true
  expiry_warning_days: 5
  near_month_strategy: "auto"
  far_month_offset: 1
  rollover_day: 15

# ==================== 商品策略映射 ====================
commodity_strategy_map:
  CUL8:
    name: "沪铜"
    market_code: 30
    market_type: "future_sh"
    directions: ["高端制造", "供应链"]
    impact_type: "cost"
    weight: 0.10
    threshold_up: 10.0
    threshold_down: -10.0
  ALL8:
    name: "沪铝"
    market_code: 30
    market_type: "future_sh"
    directions: ["高端制造", "新能源"]
    impact_type: "cost"
    weight: 0.08
    threshold_up: 8.0
    threshold_down: -8.0
  LCL8:
    name: "碳酸锂"
    market_code: 66
    market_type: "future_gz"
    directions: ["新能源", "信息技术"]
    impact_type: "cost"
    weight: 0.12
    threshold_up: 20.0
    threshold_down: -20.0
  SIL8:
    name: "工业硅"
    market_code: 66
    market_type: "future_gz"
    directions: ["信息技术", "新能源"]
    impact_type: "cost"
    weight: 0.10
    threshold_up: 15.0
    threshold_down: -15.0
  SCL8:
    name: "原油"
    market_code: 30
    market_type: "future_sh"
    directions: ["公用事业", "供应链", "传统升级"]
    impact_type: "cost"
    weight: 0.10
    threshold_up: 15.0
    threshold_down: -15.0
  RBL8:
    name: "螺纹钢"
    market_code: 30
    market_type: "future_sh"
    directions: ["传统升级", "供应链"]
    impact_type: "benefit"
    weight: 0.08
    threshold_up: 8.0
    threshold_down: -8.0
  ML8:
    name: "豆粕"
    market_code: 29
    market_type: "future_dl"
    directions: ["现代农业", "生物健康", "文化消费"]
    impact_type: "cost"
    weight: 0.08
    threshold_up: 10.0
    threshold_down: -10.0
  AUL8:
    name: "黄金"
    market_code: 30
    market_type: "future_sh"
    directions: ["公用事业"]
    impact_type: "benefit"
    weight: 0.05
    threshold_up: 8.0
    threshold_down: -8.0

# ==================== 股指期货配置 ====================
index_futures_contracts:
  if:
    variety: "IF"
    spot_code: "000300"
    spot_name: "沪深300"
    market_type: "future_zj"
  ih:
    variety: "IH"
    spot_code: "000016"
    spot_name: "上证50"
    market_type: "future_zj"
  ic:
    variety: "IC"
    spot_code: "000905"
    spot_name: "中证500"
    market_type: "future_zj"
  im:
    variety: "IM"
    spot_code: "000852"
    spot_name: "中证1000"
    market_type: "future_zj"

# ==================== 期权PCR配置 ====================
option_underlying_mapping:
  IO:
    spot_code: "000300"
    market_code: 7
    market_type: "option_zj"
    weight: 0.45
    default_price: 4000.0
  MO:
    spot_code: "000852"
    market_code: 7
    market_type: "option_zj"
    weight: 0.15
    default_price: 7000.0
  "510300":
    spot_code: "510300"
    market_code: 8
    market_type: "option_sh"
    weight: 0.18
    default_price: 4.7
  "510500":
    spot_code: "510500"
    market_code: 8
    market_type: "option_sh"
    weight: 0.07
    default_price: 8.1
  "588000":
    spot_code: "588000"
    market_code: 8
    market_type: "option_sh"
    weight: 0.10
    default_price: 1.5
  "159915":
    spot_code: "159915"
    market_code: 9
    market_type: "option_sz"
    weight: 0.05
    default_price: 3.3

option_tolerance:
  base_tolerance: 0.05
  volatility_based:
    enabled: true
    low_vol_tolerance: 0.03
    high_vol_tolerance: 0.08
  liquidity_based:
    enabled: true
    high_liquidity_tolerance: 0.04
    low_liquidity_tolerance: 0.06

# ==================== 市场Regime配置(V7新增) ====================
market_regime:
  enabled: true
  confirmation_days: 3
  volatility_window: 60
  momentum_window: 20
  regimes:
    bull:
      volatility_threshold: 0.15
      momentum_threshold: 0.05
      description: "牛市"
    bear:
      volatility_threshold: 0.30
      momentum_threshold: -0.05
      description: "熊市"
    volatile:
      volatility_threshold: 0.25
      momentum_range: [-0.02, 0.02]
      description: "震荡市"
    recovery:
      volatility_decreasing: true
      momentum_positive: true
      description: "复苏期"

# ==================== 市场状态分类(V7:3D模型) ====================
market_state_classifier:
  dimensions:
    - valuation     # 估值维度
    - momentum      # 动量维度
    - regime        # 市场体制(V7新增)
  grid:
    strategic_offense: 80
    active_allocation: 65
    balanced_hold: 50
    defensive_watch: 35
    strategic_defense: 20
  thresholds:
    valuation_weight: 0.35
    momentum_weight: 0.35
    regime_weight: 0.30

# ==================== 基准指数配置 ====================
market_benchmarks:
  大盘:
    code: "000300"
    weight: 0.40
    volatility_target: 20.0
  中盘:
    code: "000905"
    weight: 0.30
    volatility_target: 25.0
  小盘:
    code: "000852"
    weight: 0.20
    volatility_target: 30.0
  微盘:
    code: "932000"
    weight: 0.10
    volatility_target: 35.0

# ==================== 微盘监控配置 ====================
micro_redundancy:
  enabled: true
  primary: "932000"
  secondary: "399311"
  correlation_threshold: 0.85
  liquidity_check_days: 20

micro_cap_indices:
  - "930901"
  - "931588"
  - "930707"
  - "930662"

# ==================== 九大战略方向 ====================
strategic_directions:
