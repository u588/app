# ============================================================
# 宏观经济指标定义配置
# ============================================================
# 每个指标包含以下属性：
#   code: 通达信扩展市场API代码
#   name: 中文名称
#   category: 分析类别（经济增长/景气指数/价格指数/货币金融/贸易外汇/能源工业/资本市场/国际对比）
#   unit: 数据单位
#   freq: 数据频率 (M=月度, Q=季度, D=日度, Y=年度)
#   scale: 数据缩放因子（如亿元->万亿，scale=1e-4）
#   compare_codes: 关联对比指标列表
#   transform: 数据转换方式 (none/index_minus_100/pct_change12)

