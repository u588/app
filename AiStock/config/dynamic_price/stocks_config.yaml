  特高压: ["lme_copper", "china_10y_bond"]
  新能源: ["lme_copper", "m2_growth"]
  黄金: ["comex_gold", "us_10y_yield"]
  军工: ["pmi", "m2_growth"]
  政策方向: ["m2_growth", "china_10y_bond"]
