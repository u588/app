# ==================== 宏观指标映射配置 ====================
macro_indicators:
  # ----- 外盘期货（实时/日频）-----
  brent_crude:
    code: "OIL"
    source: "external"
    unit: "USD/barrel"
    normal_range: [70, 90]
    update_frequency: "realtime"
    data_type: "futures"
  
  comex_gold:
    code: "GC"
    source: "external"
    unit: "USD/oz"
    normal_range: [1800, 2500]
    update_frequency: "realtime"
    data_type: "futures"
  
  lme_copper:
    code: "CAD"
    source: "external"
    unit: "USD/ton"
    normal_range: [8000, 11000]
    update_frequency: "realtime"
    data_type: "futures"
  
  nymex_gas:
    code: "NG"
    source: "external"
    unit: "USD/MMBtu"
    normal_range: [2.0, 4.0]
    update_frequency: "realtime"
    data_type: "futures"
  
  lme_nickel:
    code: "NID"
    source: "external"
    unit: "USD/ton"
    normal_range: [15000, 25000]
    update_frequency: "realtime"
    data_type: "futures"
  
  comex_silver:
    code: "SI"
    source: "external"
    unit: "USD/oz"
    normal_range: [20, 35]
    update_frequency: "realtime"
    data_type: "futures"
  
  
  # ----- TDX 宏观指标（日频/月频）-----
  usd_cny:
    code: "5_RMBUS"
    source: "tdx"
    market_code: 38  # 宏观指标
    unit: "CNY/USD"
    normal_range: [6.8, 7.4]
    update_frequency: "daily"
    data_type: "exchange_rate"

  us_10y_bond:
    code: "8_ATY"
    source: "tdx"
    market_code: 38
    unit: "%"
    normal_range: [2.0, 5.0]
    update_frequency: "daily"
    data_type: "bond"

  china_10y_bond:
    code: "5_CNTY"
    source: "tdx"
    market_code: 38
    unit: "%"
    normal_range: [2.0, 3.5]
    update_frequency: "daily"
    data_type: "bond"
  
  pmi:
    code: "3_PMI"
    source: "tdx"
    market_code: 38
    unit: "index"
    normal_range: [48, 52]
    update_frequency: "monthly"
    data_type: "economic"
  
  m2_growth:
    code: "5_M2"
    source: "tdx"
    market_code: 38
    unit: "%"
    normal_range: [8, 12]
    update_frequency: "monthly"
    data_type: "economic"
  
  cpi:
    code: "2_CPI"
    source: "tdx"
    market_code: 38
    unit: "%"
    normal_range: [1, 3]
    update_frequency: "monthly"
    data_type: "economic"
  
  ppi:
    code: "2_PPI"
    source: "tdx"
    market_code: 38
    unit: "%"
    normal_range: [-2, 5]
    update_frequency: "monthly"
    data_type: "economic"
  
  # ----- 其他宏观指标 -----
  eua_carbon:
    code: "EUA"
    source: "external"
    unit: "EUR/ton"
    normal_range: [50, 100]
    update_frequency: "daily"
    data_type: "carbon"
  
  corn_price:
    code: "C"
    source: "external"
    unit: "USD/bushel"
    normal_range: [4.0, 7.0]
    update_frequency: "daily"
    data_type: "commodity"

sector_macro_link:
  油气开采: ["brent_crude", "pmi"]
  LNG: ["nymex_gas", "usd_cny"]
  油服: ["brent_crude", "pmi"]
