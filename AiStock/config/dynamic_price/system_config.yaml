# ==================== 系统基础配置 ====================
system:
  name: "三维动态价格调整系统"
  version: "6.2.0"
  mode: "paper_trading"  # paper_trading / real_trading / backtest
  log_level: "INFO"
  base_date: "2026-03-20"
  timezone: "Asia/Shanghai"

# ==================== 三维权重配置 ====================
weights:
  technical: 0.40    # 技术面权重
  fundamental: 0.35  # 基本面权重
  macro: 0.25        # 宏观面权重

# ==================== 缓存配置 ====================
cache:
  enable: true
  max_size: 2000
  ttl: 3600
  index_ttl: 7200
  derivative_ttl: 1800
  macro_ttl: 3600
  pe_ttl: 86400

# ==================== 数据库配置（引用全局配置） ====================
database:
  # 使用全局配置中的 DATABASE_MAIN_URL / DATABASE_PE_URL
  use_global_config: true
  pool_size: 10
  max_overflow: 20

# ==================== TDX 接口配置 ====================
tdx:
  use_tdx: true
  exhq_host: "47.112.95.207"
  exhq_port: 7720
  hq_host: "180.153.18.170"
  hq_port: 7709
  timeout: 30
  retry_times: 3

# ==================== 外盘期货配置 ====================
external_futures:
  brent_crude:
    code: "OIL"
    source: "akshare"
    unit: "USD/barrel"
  comex_gold:
    code: "GC"
    source: "akshare"
    unit: "USD/oz"
  lme_copper:
    code: "CAD"
    source: "akshare"
    unit: "USD/ton"
  nymex_gas:
    code: "NG"
    source: "akshare"
    unit: "USD/MMBtu"

# ==================== 风控阈值 ====================
risk_control:
  max_position_single: 0.15
  max_position_sector: 0.30
  stop_loss_fixed: -0.15
  take_profit_fixed: 0.30
  portfolio_drawdown_limit: -0.20
  weight_deviation_threshold: 0.15
  max_daily_loss: -0.05

# ==================== 更新频率配置 ====================
schedule:
  daily_data_update: "16:30"
  macro_data_update: "09:00"
  dynamic_price_calc: "17:00"
  alert_check: "09:30"
  cache_compact: "02:00"

# ==================== 预警配置 ====================
alerts:
  enable_email: false
  enable_wechat: false
  enable_dingtalk: false
  price_drop_threshold: -0.10
  price_rise_threshold: 0.30
  stop_loss_threshold: -0.15
  webhook_url_key: "ALERT_WEBHOOK_URL"