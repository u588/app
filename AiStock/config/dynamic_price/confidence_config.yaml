# config/dynamic_price/confidence_config.yaml
dashboard:
  theme: plotly_white
  width: 1400
  height: 1000
  export_formats: [html, png]

charts:
  single_stock:
    show_gauge: true
    show_breakdown: true
    show_diagnostics: true
    show_indicator_scatter: true
    show_historical: false
  batch_comparison:
    show_distribution: true
    show_scatter: true
    show_heatmap: true
    color_by: recommendation

filters:
  default:
    min_confidence: 0.99
    min_pl_ratio: 2.0
    sectors: []

export:
  auto_open: false
  include_plotlyjs: cdn
  watermark: "AiStock V6.2"