# ==================== 板块 - 宏观指标映射 ====================
# 定义各板块关联的宏观指标列表

sector_macro_link:
  油气开采: ["brent_crude", "pmi"]
  LNG: ["nymex_gas", "usd_cny"]
  油服: ["brent_crude", "pmi"]
  煤炭化工: ["ppi", "cpi", "eua_carbon"]
  特高压: ["lme_copper", "china_10y_bond"]
  新能源: ["lme_copper", "lme_nickel", "m2_growth"]
  黄金: ["comex_gold", "us_10y_bond"]
  军工: ["pmi", "m2_growth"]
  政策方向: ["m2_growth", "china_10y_bond"]


# ==================== 宏观计算参数配置 ====================
macro_calculation:
  # 默认敏感度（标的未配置时生效）
  default_sensitivity: 1.0
  
  # 单指标影响值截断范围（防极端值）
  impact_clip: [-0.15, 0.15]
  
  # 最终因子输出范围（保安全）
  factor_range: [0.92, 1.08]
  
  # 板块个性化敏感度（覆盖 default_sensitivity）
  sector_sensitivity:
    油气开采: 1.2    # 强周期，放大宏观影响
    LNG: 1.1         # 能源属性，中等敏感
    油服: 1.1        # 跟随油价，中等敏感
    煤炭化工: 1.0    # 成本+需求双向影响，中性
    特高压: 0.8      # 政策驱动为主，弱化宏观
    新能源: 0.9      # 成长属性，略弱化宏观
    黄金: 1.3        # 避险+金融属性，高敏感
    军工: 0.7        # 政策/订单驱动，弱化宏观
    政策方向: 0.7    # 政策驱动为主，弱化宏观
  
  # 数据新鲜度策略
  freshness_policy:
    # 超期数据处理: "use" (使用)/"downgrade" (降权)/"exclude" (排除)
    stale_action: "downgrade"
    # 降权系数: 过期指标影响×此系数
    downgrade_factor: 0.5
    # 是否记录警告日志
    log_warnings: true
  
  # 缺失指标处理策略
  missing_policy:
    # 无有效指标时返回: "neutral" (1.0)/"last_valid" (上次有效值)/"error"
    fallback: "neutral"
    # 最少有效指标数（低于此值返回 fallback）
    min_valid_indicators: 1


# ==================== 调试与诊断配置 ====================
macro_diagnostics:
  # 是否输出详细计算日志
  enable_debug_log: false
  
  # 诊断报告包含字段
  report_fields:
    - indicator_name
    - current_value
    - deviation
    - impact
    - freshness_status
  
  # 可视化面板配置（供 ConfidenceDashboard 使用）
  dashboard:
    show_deviation_chart: true
    show_impact_waterfall: true
    color_scale: "RdYlGn"  # 红 - 黄 - 绿