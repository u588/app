# ==================== 宏观指标元数据配置 ====================
# 用于 MacroCalculator 的指标影响计算
# 核心字段说明:
#   neutral: 中性值（基准点，因子=1.0）
#   range: 波动半宽（(max-min)/2），用于标准化偏差计算
#   direction: 1=正向(指标↑→利好), -1=反向(指标↑→利空)
#   impact_coefficient: 影响系数（标准化偏差×方向×系数=影响值）
#   lag_tolerance_days: 数据滞后容忍天数，超期标记为 stale
#   unit: 单位（用于展示）
#   description: 指标描述（用于诊断报告）

