  brent_crude:
    # 原始配置（保留用于数据加载）
    code: "OIL"
    source: "external"
    update_frequency: "realtime"
    data_type: "futures"
    cache_ttl: 300
    
    # 计算元数据（新增）
    neutral: 80.0
    range: 20.0
    direction: 1
    impact_coefficient: 0.12
    lag_tolerance_days: 2
    unit: "USD/barrel"
    description: "布伦特原油期货，反映全球原油供需"
  
