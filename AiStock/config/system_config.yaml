# ==================== 宏观指标配置 ====================
# 关联：index_name_mapping.yaml 中的宏观指标代码
# 功能：通过多维度宏观指标综合判断市场状态

macro_indicators:
  # ==================== 分类 1: 通胀指标 ====================
  inflation:
    enabled: true
    weight: 0.20  # 在综合评分中的权重
    description: "通胀水平影响货币政策预期和企业成本"
    indicators:
      CPI:
        code: "2_CPI"
        name: "居民消费价格指数"
        direction: "negative"  # 通胀过高通常对股市负面
        unit: "%"
        thresholds:
          warning_high: 3.0
          warning_low: -1.0
          extreme_high: 5.0
          extreme_low: -2.0
        update_frequency: "monthly"
        lag_type: "lagging"  # 滞后指标
        market_state_mapping:
          extreme_high: "战略防御区"
          warning_high: "防御观望区"
          normal: "均衡持有区"
          warning_low: "积极配置区"
          extreme_low: "警惕通缩风险"
        smoothing_window: 3  # 3 月移动平均
      
      PPI:
        code: "2_PPI"
        name: "工业出厂价格指数"
        direction: "neutral"
        unit: "%"
        thresholds:
          warning_high: 5.0
          warning_low: -3.0
          extreme_high: 8.0
          extreme_low: -5.0
        update_frequency: "monthly"
        lag_type: "leading"  # 领先指标，预示企业利润变化
        correlation_with_earnings: 0.75
      
      CGPI:
        code: "2_CGPI"
        name: "企业商品价格指数"
        direction: "neutral"
        unit: "%"
        thresholds:
          warning_high: 4.0
          warning_low: -2.0
        update_frequency: "monthly"
        lag_type: "leading"
      
      RPI:
        code: "2_RPI"
        name: "商品零售价格指数"
        direction: "neutral"
        unit: "%"
        thresholds:
          warning_high: 3.5
          warning_low: -1.5
        update_frequency: "monthly"
        lag_type: "coincident"

  # ==================== 分类 2: 经济增长指标 ====================
  growth:
    enabled: true
    weight: 0.25
    description: "经济增长是股市长期向好的基础"
    indicators:
      GDP:
        code: "1_GDPI"
        name: "当季国内生产总值"
        direction: "positive"
        unit: "%"
        thresholds:
          warning_high: 6.0
          warning_low: 4.0
          extreme_high: 8.0
          extreme_low: 2.0
        update_frequency: "quarterly"
        lag_type: "lagging"
        market_state_mapping:
          extreme_high: "战略进攻区"
          warning_high: "积极配置区"
          normal: "均衡持有区"
          warning_low: "防御观望区"
          extreme_low: "战略防御区"
      
      industrial_production:
        code: "6_VAI"
        name: "工业增加值"
        direction: "positive"
        unit: "%"
        thresholds:
          warning_high: 7.0
          warning_low: 3.0
        update_frequency: "monthly"
        lag_type: "coincident"
        sector_correlation:
          高端制造: 0.85
          传统升级: 0.75
          新能源: 0.65
      
      electricity:
        code: "6_TEG"
        name: "全国发电量"
        direction: "positive"
        unit: "亿度"
        thresholds:
          warning_high: 8.0  # YoY 增长
          warning_low: 2.0
        update_frequency: "monthly"
        lag_type: "coincident"
        is_high_frequency: true
      
      fixed_investment:
        code: "6_UFA"
        name: "城镇固定资产投资"
        direction: "positive"
        unit: "%"
        thresholds:
          warning_high: 10.0
          warning_low: 4.0
        update_frequency: "monthly"
        lag_type: "leading"
        sector_correlation:
          传统升级: 0.90
          供应链: 0.70
          公用事业: 0.60

  # ==================== 分类 3: 流动性指标 ====================
  liquidity:
    enabled: true
    weight: 0.25
    description: "流动性是股市短期波动的核心驱动"
    indicators:
      shibor_3m:
        code: "5_SHS3M"
        name: "SHIBOR3 月"
        direction: "negative"  # 利率上升通常对股市负面
        unit: "%"
        thresholds:
          warning_high: 3.5
          warning_low: 1.5
          extreme_high: 5.0
          extreme_low: 1.0
        update_frequency: "daily"
        lag_type: "leading"
        market_state_mapping:
          extreme_high: "战略防御区"
          warning_high: "防御观望区"
          normal: "均衡持有区"
          warning_low: "积极配置区"
          extreme_low: "警惕流动性陷阱"
      
      margin_balance:
        code: "7_RZ"
        name: "沪深融资余额"
        direction: "positive"
        unit: "亿元"
        thresholds:
          warning_high: 18000
          warning_low: 14000
          extreme_high: 20000
          extreme_low: 12000
        update_frequency: "daily"
        lag_type: "coincident"
        sentiment_indicator: true
        correlation_with_turnover: 0.85
      
      etf_scale:
        code: "7_TETF"
        name: "ETF 基金规模"
        direction: "positive"
        unit: "亿元"
        thresholds:
          warning_high: 25000
          warning_low: 15000
        update_frequency: "daily"
        lag_type: "coincident"
        institutional_flow_indicator: true
      
      north_flow:
        code: "7_TON"
        name: "累计北上资金"
        direction: "positive"
        unit: "亿元"
        thresholds:
          warning_high: 20000
          warning_low: 15000
          flow_threshold_daily: 100  # 单日净流入阈值
        update_frequency: "daily"
        lag_type: "leading"
        smart_money_indicator: true
        sector_preference:
          高端制造: 0.35
          信息技术: 0.30
          新能源: 0.20
          生物健康: 0.15
      
      south_flow:
        code: "7_TOS"
        name: "累计南下资金"
        direction: "positive"
        unit: "亿元"
        thresholds:
          warning_high: 15000
          warning_low: 10000
        update_frequency: "daily"
        lag_type: "leading"
        cross_border_indicator: true

  # ==================== 分类 4: 信心/情绪指标 ====================
  sentiment:
    enabled: true
    weight: 0.15
    description: "市场情绪是短期波动的放大器"
    indicators:
      consumer_confidence:
        code: "3_CCI"
        name: "消费者信心指数"
