# ==================== 风险阈值配置 ====================
risk_thresholds:
  pcr:
    warning_high: 1.3
    warning_low: 0.7
    extreme_high: 1.5
    extreme_low: 0.5
    ma_window: 5
  basis:
    warning: -1.5
    extreme: -2.0
    ma_window: 10
  valuation:
    overvalued_pe_percentile: 75
    undervalued_pe_percentile: 25
    erp_warning: 1.5
    erp_safe: 3.5
  volatility:
    warning_expansion: 1.8
    extreme_expansion: 2.5
    ma_window: 60
  liquidity:
    warning_shrink: 0.6
    extreme_shrink: 0.4
    ma_window: 5
  correlation:
    micro_primary_secondary: 0.85
    direction_benchmark: 0.70

# ==================== 仓位控制配置 ====================
position_control:
  # 市场状态对应的仓位限制
  market_state_weights:
    战略进攻区:
      equity_min: 0.75
      equity_max: 0.85
      micro_exposure: 0.15
      cash_min: 0.15
    积极配置区:
      equity_min: 0.75
      equity_max: 0.85
      micro_exposure: 0.15
      cash_min: 0.15
    防御进攻区:
      equity_min: 0.60
      equity_max: 0.65
      micro_exposure: 0.10
      cash_min: 0.35
    左侧布局区:
      equity_min: 0.70
      equity_max: 0.75
      micro_exposure: 0.12
      cash_min: 0.25
    均衡持有区:
      equity_min: 0.55
      equity_max: 0.65
      micro_exposure: 0.10
      cash_min: 0.35
    防御观望区:
      equity_min: 0.40
      equity_max: 0.50
      micro_exposure: 0.05
      cash_min: 0.50
    左侧防御区:
      equity_min: 0.50
      equity_max: 0.55
      micro_exposure: 0.08
      cash_min: 0.45
    谨慎持有区:
      equity_min: 0.35
      equity_max: 0.45
      micro_exposure: 0.05
      cash_min: 0.55
    战略防御区:
      equity_min: 0.20
      equity_max: 0.30
      micro_exposure: 0.00
      cash_min: 0.70
  
  # 微盘流动性熔断阶段
  micro_liquidity_stages:
    normal:
      exposure_cap: 0.20
      weight_primary: 0.6
      weight_secondary: 0.4
    early_warning:
      exposure_cap: 0.15
      weight_primary: 0.5
      weight_secondary: 0.5
    watch:
      exposure_cap: 0.10
      weight_primary: 0.3
      weight_secondary: 0.7
    melted:
      exposure_cap: 0.00
      weight_primary: 0.0
      weight_secondary: 0.0
  
  # 单个方向仓位限制
  direction_limits:
    max_single_direction: 0.35
    min_single_direction: 0.01
    max_commodity_impact: 0.20
    max_style_adjustment: 0.10

