        code: "9_990002"
        name: "股票型基金指数"
        direction: "positive"
        unit: "指数"
        thresholds:
          warning_high: 110  # 相对基准
          warning_low: 90
        update_frequency: "daily"
        lag_type: "coincident"
        institutional_sentiment: true
      
      bond_fund_index:
        code: "9_990003"
        name: "债券型基金指数"
        direction: "negative"  # 债基走强通常意味着风险偏好下降
        unit: "指数"
        thresholds:
          warning_high: 108
          warning_low: 92
        update_frequency: "daily"
        lag_type: "leading"
        risk_off_indicator: true
      
      money_fund_index:
        code: "9_990005"
        name: "货币型基金指数"
        direction: "negative"
        unit: "指数"
        thresholds:
          warning_high: 105
          warning_low: 95
        update_frequency: "daily"
        lag_type: "leading"
        safe_haven_indicator: true

  # ==================== 综合评分配置 ====================
  composite_scoring:
    method: "weighted_average"  # weighted_average / exponential_smoothing / bayesian
    rebalance_frequency: "weekly"  # 每周重新计算综合评分
    min_data_coverage: 0.8  # 至少 80% 指标有数据才计算
    
    # 市场状态阈值
    market_state_thresholds:
      strategic_offense: 80    # ≥80: 战略进攻区
      active_allocation: 65    # 65-79: 积极配置区
      balanced_hold: 50        # 50-64: 均衡持有区
      defensive_watch: 35      # 35-49: 防御观望区
      strategic_defense: 20    # <35: 战略防御区
    
    # 信号平滑配置
    signal_smoothing:
      enabled: true
      method: "exponential_moving_average"
      alpha: 0.3  # 平滑系数
      min_confidence: 0.6  # 最低置信度要求
      conflict_resolution: "majority_vote"  # 指标冲突时的解决策略
    
    # 指标权重动态调整
    dynamic_weighting:
      enabled: true
      regime_based: true  # 根据市场状态调整权重
      regimes:
        high_volatility:
          liquidity_weight: 0.35
          sentiment_weight: 0.20
          growth_weight: 0.20
          inflation_weight: 0.15
          external_weight: 0.10
        low_volatility:
          liquidity_weight: 0.20
          sentiment_weight: 0.15
          growth_weight: 0.30
          inflation_weight: 0.20
          external_weight: 0.15

  # ==================== 预警规则系统 ====================
  alert_rules:
    # 规则 1: 通胀上行预警
    - name: "通胀上行预警"
      condition: "CPI > 3.0 AND PPI > 5.0"
      action: "reduce_equity_exposure"
      priority: "high"
      suggested_adjustment: -0.10  # 建议降低权益仓位 10%
      affected_directions: ["文化消费", "现代农业"]
    
    # 规则 2: 流动性收紧预警
    - name: "流动性收紧预警"
      condition: "shibor_3m > 3.5 AND margin_balance < 14000"
      action: "increase_cash_position"
      priority: "high"
      suggested_adjustment: -0.15
      affected_directions: ["高端制造", "信息技术", "新能源"]
    
    # 规则 3: 外部风险上升预警
    - name: "外部风险上升预警"
      condition: "us_10y_yield > 4.5 AND usd_cny > 7.3"
      action: "reduce_overseas_exposure"
      priority: "medium"
      suggested_adjustment: -0.08
      affected_directions: ["信息技术", "文化消费"]
    
    # 规则 4: 经济复苏确认
    - name: "经济复苏确认"
      condition: "GDP > 5.0 AND industrial_production > 5.0 AND consumer_confidence > 100"
      action: "increase_equity_exposure"
      priority: "medium"
      suggested_adjustment: +0.10
      affected_directions: ["高端制造", "传统升级", "供应链"]
    
    # 规则 5: 资金大幅流入
    - name: "资金大幅流入确认"
      condition: "north_flow_daily > 100 AND margin_balance_change_5d > 500"
      action: "maintain_or_increase_exposure"
      priority: "low"
      suggested_adjustment: +0.05
      affected_directions: ["高端制造", "信息技术"]
    
    # 规则 6: 通缩风险预警
    - name: "通缩风险预警"
      condition: "CPI < -1.0 AND PPI < -3.0"
      action: "defensive_positioning"
      priority: "high"
      suggested_adjustment: -0.12
      affected_directions: ["传统升级", "供应链"]

  # ==================== 指标间相关性配置 ====================
  correlation_matrix:
    # 正相关指标组
    positive_cluster:
      - ["GDP", "industrial_production", "electricity", "fixed_investment"]
      - ["consumer_confidence", "business_confidence", "consumer_expectation"]
      - ["margin_balance", "etf_scale", "north_flow"]
    
    # 负相关指标组
    negative_cluster:
      - ["shibor_3m", "us_10y_yield"]
      - ["CPI", "equity_fund_index"]  # 通胀高时权益基金可能流出
    
    # 跨市场传导
    cross_market:
      us_10y_yield_to_A_shares: -0.45
      usd_cny_to_north_flow: -0.60
      us_pmi_to_export_sectors: 0.55

  # ==================== 数据质量配置 ====================
  data_quality:
    missing_value_handling: "interpolate"  # interpolate / forward_fill / exclude
    outlier_detection:
      enabled: true
      method: "z_score"
      threshold: 3.0
    revision_handling:
      enabled: true
      use_latest: true  # 使用最新修订值
      track_revisions: true  # 记录修订历史

  # ==================== 输出配置 ====================
  output:
    include_component_scores: true  # 输出各分类得分
    include_indicator_details: true  # 输出各指标详情
    confidence_interval: 0.95  # 置信区间
    export_format: ["json", "csv"]
    alert_channels: ["log", "email", "webhook"]

# ==================== 可视化配置 ====================
visualization:
  enabled: true
  chinese_font_family: "Microsoft YaHei, SimHei, sans-serif"
  chart_height_default: 600
  chart_width_default: 1200
  color_palette:
    primary: "#3498db"
    success: "#27ae60"
    warning: "#f39c12"
    danger: "#e74c3c"
    info: "#9b59b6"
  export_format: ["html", "png"]
  export_path: "reports/"

# ==================== 日志配置 ====================
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file_enabled: true
  file_path: "logs/quant_system.log"
  file_max_size: "10MB"
  file_backup_count: 5

# ==================== 性能配置 ====================
performance:
  parallel_loading: true
  max_workers: 5
  cache_enabled: true
  cache_ttl: 3600
  cache_max_size: 1000
  timeout_seconds: 30
  retry_count: 3
  retry_delay_seconds: 2

# ==================== 回测配置 ====================
backtest:
  enabled: false
  start_date: "2020-01-01"
  end_date: "2026-02-14"
  rebalance_frequency: "monthly"
  transaction_cost: 0.001
  slippage: 0.0005
  benchmark: "000300"

# ==================== 版本信息 ====================
version:
  system_version: "5.7.0"
  config_version: "1.0.0"
  last_updated: "2026-02-14"
  author: "Quant Team"