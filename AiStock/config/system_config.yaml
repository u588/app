# ==================== 数据库配置 ====================
database:
  main_db: "postgresql+psycopg://sa:11111111@10.3.18.56/tdxIndex"
  pe_db: "postgresql+psycopg://sa:11111111@10.3.18.56/csiIndexPE"
  cache_enabled: true
  cache_ttl: 3600

# ==================== TDX 接口配置 ====================
tdx:
  exhq_host: "47.112.95.207"
  exhq_port: 7720
  hq_host: "180.153.18.170"
  hq_port: 7709
  use_tdx: true
  timeout: 30
  retry_count: 3
  parallel_workers: 5

# ==================== 系统参数 ====================
system:
  base_date: null  # null=使用今天
  visualize: true
  degradation_mode: "auto"  # auto/strict/conservative
  log_level: "INFO"
  max_workers: 5
  cache_ttl: 3600
  data_min_days: 500  # 指数数据最小天数要求

# ==================== 市值分层配置 ====================
# 关联：index_name_mapping.yaml 中的指数代码
market_benchmarks:
  大盘:
    code: "000300"
    weight: 0.40
    volatility_target: 20.0
  中盘:
    code: "000905"
    weight: 0.30
    volatility_target: 25.0
  小盘:
    code: "000852"
    weight: 0.20
    volatility_target: 30.0
  微盘:
    code: "932000"
    weight: 0.10
    volatility_target: 35.0

# ==================== 微盘冗余配置 ====================
