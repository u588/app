# ==================== 宏观指标配置 ====================
# 关联：index_name_mapping.yaml 中的宏观指标代码
macro_indicators:
  bond_yield:
    code: "8_ATY"
    enabled: true
    weight: 0.40
  margin_balance:
    code: "7_RZ"
    enabled: true
    weight: 0.30
  north_flow:
    code: "7_TON"
    enabled: true
    weight: 0.30
  etf_scale:
    code: "7_TETF"
    enabled: true
    weight: 0.20

# ==================== 可视化配置 ====================
visualization:
  enabled: true
  chinese_font_family: "Microsoft YaHei, SimHei, sans-serif"
  chart_height_default: 600
  chart_width_default: 1200
  color_palette:
    primary: "#3498db"
    success: "#27ae60"
    warning: "#f39c12"
    danger: "#e74c3c"
    info: "#9b59b6"
  export_format: ["html", "png"]
  export_path: "reports/"

# ==================== 日志配置 ====================
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file_enabled: true
  file_path: "logs/quant_system.log"
  file_max_size: "10MB"
  file_backup_count: 5

# ==================== 性能配置 ====================
performance:
  parallel_loading: true
  max_workers: 5
  cache_enabled: true
  cache_ttl: 3600
  cache_max_size: 1000
  timeout_seconds: 30
  retry_count: 3
  retry_delay_seconds: 2

# ==================== 回测配置 ====================
backtest:
  enabled: false
  start_date: "2020-01-01"
  end_date: "2026-02-14"
  rebalance_frequency: "monthly"
  transaction_cost: 0.001
  slippage: 0.0005
  benchmark: "000300"

# ==================== 版本信息 ====================
version:
  system_version: "5.7.0"
  config_version: "1.0.0"
  last_updated: "2026-02-14"
  author: "Quant Team"