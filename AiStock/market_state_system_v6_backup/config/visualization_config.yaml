# 可视化配置
chinese_font: "Microsoft YaHei, SimHei, sans-serif"
chart_height: 600
chart_width: 1200

# 颜色方案
color_palette:
  primary: "#3498db"
  success: "#27ae60"
  warning: "#f39c12"
  danger: "#e74c3c"
  info: "#9b59b6"
  neutral: "#95a5a6"

# 图表配置
charts:
  valuation_diagnostic:
    height: 700
    show_annotations: true
  
  market_trend:
    height: 750
    normalize_base_date: "2020-01-02"
  
  micro_liquidity:
    height: 800
    warning_threshold: 0.6
    extreme_threshold: 0.4
  
  market_state_chart:
    height: 600
    regions:
      strategic_offense: "#27ae60"
      active_allocation: "#2ecc71"
      defensive_offense: "#f39c12"
      left_layout: "#3498db"
      balanced_hold: "#95a5a6"
      defensive_watch: "#e67e22"
      left_defense: "#e74c3c"
      cautious_hold: "#c0392b"
      strategic_defense: "#922b21"
  
  allocation_chart:
    height: 600
    direction_colors:
      高端制造: "#1f77b4"
      信息技术: "#ff7f0e"
      新能源: "#2ca02c"
      生物健康: "#d62728"
      公用事业: "#9467bd"
      供应链: "#8c564b"
      传统升级: "#e377c2"
      文化消费: "#7f7f7f"
      现代农业: "#bcbd22"

# 导出配置
export:
  format: ["html", "png"]
  path: "reports/"
  html_template: "templates/report_template.html"
  auto_open: false

# 交互配置
interactive:
  hover_mode: "x unified"
  show_legend: true
  legend_orientation: "h"