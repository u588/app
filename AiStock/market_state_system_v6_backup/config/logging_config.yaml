version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | [%(filename)s:%(lineno)d] | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: "logs/system.log"
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: "logs/error.log"
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  MarketStateSystemV6_0:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  RiskAssessmentService:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  SentimentAnalysisService:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  VisualizationService:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  
  # ... 其他服务日志配置

root:
  level: WARNING
  handlers: [console]