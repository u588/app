# ============================================================
# 供应链/竞争/协同/验证 关系定义配置
# ============================================================
# 关系类型:
#   supply_chain: 供应链关系（上游→中游→下游的供需流动）
#   competition:  竞争关系（同赛道/同分类内的直接竞争）
#   synergy:      协同关系（跨赛道/跨方向的互补协作）
#   validation:   验证关系（下游需求对上游技术/产品的验证确认）
# ============================================================

