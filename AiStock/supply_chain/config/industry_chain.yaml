# ============================================================
# 产业链上中下游配置
# 定义各一级方向的产业链层级映射
# ============================================================

industry_chain:
  半导体国产化:
    display_name: "半导体国产化"
    upstream:
      - 二级分类: "设备材料"
        三级赛道: ["刻蚀薄膜", "光刻硅片"]
        description: "半导体设备与核心材料是产业链最上游，包括刻蚀设备、薄膜沉积设备、光刻机、硅片、光刻胶、电子特气、靶材等"
        key_inputs: ["硅片", "光刻胶", "电子特气", "靶材", "前驱体"]
    midstream:
      - 二级分类: "晶圆制造"
        三级赛道: ["成熟制程", "先进封装"]
        description: "晶圆制造是产业链核心环节，包括晶圆代工、特色工艺、先进封装、芯片测试等"
        key_inputs: ["设备", "材料"]
        key_outputs: ["晶圆", "封装芯片"]
    downstream:
      - 二级分类: "第三代半导体"
        三级赛道: ["SiC/GaN"]
        description: "第三代半导体面向终端应用，SiC/GaN器件广泛应用于新能源车、光伏、5G等高功率高频场景"
        key_inputs: ["衬底", "外延"]
        key_outputs: ["功率器件", "射频器件", "光电器件"]

  人工智能:
    display_name: "人工智能"
    upstream:
      - 二级分类: "算力基建"
        三级赛道: ["算力芯片", "光液冷"]
        description: "算力基础设施是AI产业链的基础，包括GPU/DCU芯片、光模块、液冷散热等硬件"
        key_inputs: ["芯片设计IP", "先进制程", "光器件"]
    midstream:
      - 二级分类: "大模型基座"
        三级赛道: ["大模型基座"]
        description: "大模型是AI核心平台，整合算力与数据，提供通用智能基座能力"
        key_inputs: ["算力芯片", "训练数据"]
        key_outputs: ["大模型API", "行业Agent"]
    downstream:
      - 二级分类: "应用场景"
        三级赛道: []
        description: "AI应用覆盖教育、医疗、政务、金融、办公等多场景落地"
        key_inputs: ["大模型能力", "行业数据"]
        key_outputs: ["行业解决方案", "智能终端"]

  战略资源:
    display_name: "战略资源"
    upstream:
      - 二级分类: "稀土永磁"
        三级赛道: ["稀土开采"]
        description: "稀土开采是资源产业链最上游，掌握轻稀土与中重稀土战略资源"
        key_inputs: ["矿权", "冶炼配额"]
    midstream:
      - 二级分类: "能源金属"
        三级赛道: ["铜锂钴"]
        description: "能源金属冶炼加工是中游核心，铜锂钴镍等金属的采选冶炼与深加工"
        key_inputs: ["原矿", "冶炼技术"]
        key_outputs: ["碳酸锂", "氢氧化锂", "电解铜", "钴盐"]
    downstream:
      - 二级分类: "战略小金属"
        三级赛道: ["锑钨锡"]
        description: "战略小金属深加工面向终端，钨钼硬质合金、锑阻燃剂、锗半导体材料等高附加值产品"
        key_inputs: ["精矿", "中间产品"]
        key_outputs: ["硬质合金", "阻燃剂", "半导体材料"]

  国防军工:
    display_name: "国防军工"
    upstream:
      - 二级分类: "军工材料"
        三级赛道: ["碳纤维复材"]
        description: "军工材料是装备制造的基础，碳纤维、钛合金、高温合金、隐身涂层等关键材料"
        key_inputs: ["原丝", "预浸料", "合金原料"]
    midstream:
      - 二级分类: "军工电子"
        三级赛道: ["信息化"]
        description: "军工电子是装备信息化核心，FPGA、连接器、雷达芯片、相控阵T/R芯片等"
        key_inputs: ["芯片", "元器件", "材料"]
        key_outputs: ["电子分系统", "信息化模块"]
    downstream:
      - 二级分类: "主战装备"
        三级赛道: ["航空发动机"]
        description: "主战装备是军工产业链终端，航空发动机、战斗机、运输机等整机总装集成"
        key_inputs: ["发动机", "航电系统", "复材结构件"]
        key_outputs: ["航空发动机", "战斗机", "运输机"]

  新能源:
    display_name: "新能源"
    upstream:
      - 二级分类: "光伏技术"
        三级赛道: ["N型电池"]
        description: "光伏N型电池技术迭代是上游，TOPCon/HJT/BC等高效电池技术及设备"
        key_inputs: ["硅料", "银浆", "设备"]
    midstream:
      - 二级分类: "储能电池"
        三级赛道: ["储能系统"]
        description: "储能电池是新能源中游核心，动力电池与储能系统集成"
        key_inputs: ["正极材料", "负极材料", "电解液"]
        key_outputs: ["电芯", "电池模组", "储能系统"]
    downstream:
      - 二级分类: "应用场景"
        三级赛道: []
        description: "新能源下游覆盖电站运营、工商业储能、充电网络等应用场景"
        key_inputs: ["组件", "逆变器", "储能系统"]
        key_outputs: ["电力", "储能服务"]

  数据要素:
    display_name: "数据要素"
    upstream:
      - 二级分类: "数据安全"
        三级赛道: ["隐私计算"]
        description: "数据安全是数据要素流通的保障基础，隐私计算、密码技术、数据脱敏等"
        key_inputs: ["加密算法", "安全硬件"]
    midstream:
      - 二级分类: "数据资产"
        三级赛道: ["确权交易"]
        description: "数据资产确权与交易是核心环节，数据确权、评估、交易平台运营"
        key_inputs: ["数据资源", "安全技术"]
        key_outputs: ["数据产品", "数据服务"]
    downstream:
      - 二级分类: "数据应用"
        三级赛道: []
        description: "数据要素下游覆盖政务数据运营、金融数据服务、工业数据平台等"
        key_inputs: ["数据产品", "API服务"]
        key_outputs: ["行业数据解决方案"]

  低空经济:
    display_name: "低空经济"
    upstream:
      - 二级分类: "低空基建"
        三级赛道: ["通信空管"]
        description: "低空基础设施是产业前提，空管系统、通信导航、监视系统等"
        key_inputs: ["通信设备", "导航定位", "雷达"]
    midstream:
      - 二级分类: "飞行器制造"
        三级赛道: ["eVTOL整机"]
        description: "eVTOL及无人机制造是产业链核心，整机设计制造与系统集成"
        key_inputs: ["动力系统", "航电系统", "复合材料"]
        key_outputs: ["eVTOL", "工业无人机"]
    downstream:
      - 二级分类: "运营服务"
        三级赛道: []
        description: "低空运营服务覆盖物流配送、空中出行、巡检测绘等"
        key_inputs: ["飞行器", "空域许可"]
        key_outputs: ["低空运输服务", "巡检服务"]

  创新药:
    display_name: "创新药"
    upstream:
      - 二级分类: "产业化"
        三级赛道: ["CDMO/CRO"]
        description: "CRO/CDMO是创新药研发生产的基础服务商，提供临床前/临床/工艺开发/生产全链条服务"
        key_inputs: ["分子砌块", "实验动物", "临床资源"]
    midstream:
      - 二级分类: "前沿平台"
        三级赛道: ["ADC/GLP-1"]
        description: "ADC/GLP-1等前沿技术平台是创新药核心研发力量，掌握关键技术与管线"
        key_inputs: ["CRO/CDMO服务", "靶点发现"]
        key_outputs: ["创新药管线", "临床批件"]
    downstream:
      - 二级分类: "商业化"
        三级赛道: []
        description: "创新药商业化包括药品上市、医保谈判、全球License-out等"
        key_inputs: ["临床数据", "生产批件"]
        key_outputs: ["上市药品", "License收入"]

  消费升级:
    display_name: "消费升级"
    upstream:
      - 二级分类: "数字消费"
        三级赛道: ["AI终端"]
        description: "AI终端是消费升级的技术驱动，AI手机/PC/可穿戴设备等智能终端"
        key_inputs: ["芯片", "传感器", "结构件"]
    midstream:
      - 二级分类: "银发经济"
        三级赛道: ["医疗器械"]
        description: "银发经济是消费升级的核心赛道，家用医疗器械、康复设备、慢病管理等"
        key_inputs: ["传感器", "通信模组", "AI算法"]
        key_outputs: ["家用医疗设备", "康复器械", "健康管理系统"]
    downstream:
      - 二级分类: "消费服务"
        三级赛道: []
        description: "消费升级下游覆盖健康管理平台、在线医疗、智慧养老等"
        key_inputs: ["智能设备", "健康数据"]
        key_outputs: ["健康管理服务"]

  人形机器人:
    display_name: "人形机器人"
    upstream:
      - 二级分类: "核心零部件"
        三级赛道: ["传感器", "微特电机"]
        description: "传感器与微特电机是机器人基础零部件，六维力矩传感器、空心杯电机、线性执行器等"
        key_inputs: ["永磁材料", "芯片", "精密加工"]
    midstream:
      - 二级分类: "核心零部件"
        三级赛道: ["关节减速器"]
        description: "关节减速器是人形机器人核心运动部件，谐波减速器、RV减速器、行星滚柱丝杠等"
        key_inputs: ["齿轮材料", "轴承", "电机"]
        key_outputs: ["关节模组", "减速器总成"]
    downstream:
      - 二级分类: "整机制造"
        三级赛道: []
        description: "人形机器人整机集成，包含运动控制、AI决策、人机交互等系统"
        key_inputs: ["关节模组", "传感器", "AI芯片"]
        key_outputs: ["人形机器人整机"]