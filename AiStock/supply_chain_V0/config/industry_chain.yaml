# ============================================================
# 产业链上中下游配置
# 定义各一级方向的产业链层级映射
# 基于"十大投资方向分类体系标的池（2026.5）.xlsx"重构
# ============================================================

industry_chain:
  半导体:
    display_name: "半导体"
    upstream:
      - 二级分类: "设备材料"
        三级赛道: ["刻蚀与薄膜", "光刻与硅片"]
        description: "半导体设备与核心材料是产业链最上游，包括刻蚀设备、薄膜沉积设备、光刻机、硅片、光刻胶、电子特气、靶材等"
        key_inputs: ["硅片", "光刻胶", "电子特气", "靶材", "前驱体"]
      - 二级分类: "EDA与IP"
        三级赛道: ["EDA工具", "芯片IP与服务"]
        description: "EDA工具与芯片IP是半导体设计的基础设施，是产业链最上游的设计环节"
        key_inputs: ["工艺节点数据", "IP授权"]
    midstream:
      - 二级分类: "晶圆制造"
        三级赛道: ["成熟制程代工", "先进封装"]
        description: "晶圆制造是产业链核心环节，包括晶圆代工、特色工艺、先进封装、芯片测试等"
        key_inputs: ["设备", "材料"]
        key_outputs: ["晶圆", "封装芯片"]
    downstream:
      - 二级分类: "第三代半导体"
        三级赛道: ["SiC/GaN"]
        description: "第三代半导体面向终端应用，SiC/GaN器件广泛应用于新能源车、光伏、5G等高功率高频场景"
        key_inputs: ["衬底", "外延"]
        key_outputs: ["功率器件", "射频器件", "光电器件"]

  人工智能:
    display_name: "人工智能"
    upstream:
      - 二级分类: "算力基建"
        三级赛道: ["算力芯片", "光模块与CPO", "液冷温控"]
        description: "算力基础设施是AI产业链的基础，包括GPU/DCU芯片、光模块、液冷散热等硬件"
        key_inputs: ["芯片设计IP", "先进制程", "光器件"]
    midstream:
      - 二级分类: "大模型基座"
        三级赛道: ["推理侧优化", "通用大模型"]
        description: "大模型是AI核心平台，整合算力与数据，提供通用智能基座与推理优化能力"
        key_inputs: ["算力芯片", "训练数据"]
        key_outputs: ["大模型API", "行业Agent"]
      - 二级分类: "Agent与智能体"
        三级赛道: ["企业级AI Agent与服务"]
        description: "AI Agent与智能体是AI从模型走向应用的关键桥梁，面向企业级自动化服务"
        key_inputs: ["大模型能力", "行业知识"]
        key_outputs: ["企业级AI服务", "自动化解决方案"]
    downstream:
      - 二级分类: "行业应用"
        三级赛道: ["AI+医疗", "AI+教育", "AI+法律", "AI+金融"]
        description: "AI应用覆盖教育、医疗、法律、金融等多场景落地"
        key_inputs: ["大模型能力", "行业数据"]
        key_outputs: ["行业解决方案", "智能终端"]
      - 二级分类: "6G与通信"
        三级赛道: ["6G关键技术", "星地融合"]
        description: "6G与星地融合通信是AI与通信融合的下游应用场景"
        key_inputs: ["AI算法", "通信芯片"]
        key_outputs: ["6G设备", "卫星通信终端"]
      - 二级分类: "AI安全与治理"
        三级赛道: ["AI安全与治理"]
        description: "AI安全与治理是AI大规模应用的前提保障"
        key_inputs: ["AI模型", "安全算法"]
        key_outputs: ["AI安全产品", "治理平台"]
      - 二级分类: "量子科技"
        三级赛道: ["量子计算"]
        description: "量子计算是AI算力的前沿拓展方向"
        key_inputs: ["量子比特", "控制系统"]
        key_outputs: ["量子计算机", "量子云服务"]

  战略资源:
    display_name: "战略资源"
    upstream:
      - 二级分类: "稀土永磁"
        三级赛道: ["稀土开采与磁材"]
        description: "稀土开采是资源产业链最上游，掌握轻稀土与中重稀土战略资源"
        key_inputs: ["矿权", "冶炼配额"]
    midstream:
      - 二级分类: "能源金属"
        三级赛道: ["铜锂钴"]
        description: "能源金属冶炼加工是中游核心，铜锂钴镍等金属的采选冶炼与深加工"
        key_inputs: ["原矿", "冶炼技术"]
        key_outputs: ["碳酸锂", "氢氧化锂", "电解铜", "钴盐"]
      - 二级分类: "战略小金属"
        三级赛道: ["锑钨锡钼"]
        description: "战略小金属冶炼加工，钨钼硬质合金、锑阻燃剂、锗半导体材料等"
        key_inputs: ["精矿", "冶炼技术"]
        key_outputs: ["硬质合金", "阻燃剂", "半导体材料"]
    downstream:
      - 二级分类: "农业种业"
        三级赛道: ["种子与生物育种", "钾肥与磷矿"]
        description: "农业种业是战略资源的终端应用，种源安全与粮食安全紧密关联"
        key_inputs: ["种质资源", "化肥原料"]
        key_outputs: ["种子", "化肥"]
      - 二级分类: "循环经济"
        三级赛道: ["废旧高值化", "电池回收与再生"]
        description: "循环经济是战略资源的绿色终端，资源回收再生实现闭环利用"
        key_inputs: ["废旧资源", "再生技术"]
        key_outputs: ["再生金属", "再生材料"]

  国防军工:
    display_name: "国防军工"
    upstream:
      - 二级分类: "军工材料"
        三级赛道: ["碳纤维与复材"]
        description: "军工材料是装备制造的基础，碳纤维、钛合金、高温合金、隐身涂层等关键材料"
        key_inputs: ["原丝", "预浸料", "合金原料"]
    midstream:
      - 二级分类: "军工电子"
        三级赛道: ["信息化与连接器"]
        description: "军工电子是装备信息化核心，FPGA、连接器、雷达芯片、相控阵T/R芯片等"
        key_inputs: ["芯片", "元器件", "材料"]
        key_outputs: ["电子分系统", "信息化模块"]
      - 二级分类: "商业航天"
        三级赛道: ["火箭与卫星", "低轨卫星互联网", "航天配套", "遥感与导航"]
        description: "商业航天是军民融合的中游核心，火箭卫星制造与航天配套系统"
        key_inputs: ["航天材料", "电子元器件", "推进系统"]
        key_outputs: ["火箭", "卫星", "导航服务"]
    downstream:
      - 二级分类: "主战装备"
        三级赛道: ["整机总装", "无人机与导弹", "航空发动机"]
        description: "主战装备是军工产业链终端，战斗机、运输机、航空发动机等整机总装集成"
        key_inputs: ["发动机", "航电系统", "复材结构件"]
        key_outputs: ["航空发动机", "战斗机", "运输机"]
      - 二级分类: "深海深地"
        三级赛道: ["探测与装备"]
        description: "深海深地探测是军工下游前沿方向"
        key_inputs: ["声纳技术", "耐压材料"]
        key_outputs: ["深海装备", "探测系统"]

  新能源:
    display_name: "新能源"
    upstream:
      - 二级分类: "光伏技术"
        三级赛道: ["N型电池与钙钛矿"]
        description: "光伏N型电池技术迭代是上游，TOPCon/HJT/BC等高效电池技术及设备"
        key_inputs: ["硅料", "银浆", "设备"]
    midstream:
      - 二级分类: "储能系统"
        三级赛道: ["储能集成", "长时储能"]
        description: "储能系统是新能源中游核心，动力电池与储能系统集成"
        key_inputs: ["正极材料", "负极材料", "电解液"]
        key_outputs: ["电芯", "电池模组", "储能系统"]
      - 二级分类: "智能电网"
        三级赛道: ["虚拟电厂与特高压"]
        description: "智能电网是新能源中游的输配电核心，虚拟电厂与特高压输送"
        key_inputs: ["储能系统", "功率器件"]
        key_outputs: ["电力调度", "输变电设备"]
    downstream:
      - 二级分类: "智能驾驶"
        三级赛道: ["L3+自动驾驶", "800V高压快充", "三电与整车"]
        description: "智能驾驶是新能源下游核心应用，自动驾驶+高压快充+三电整车"
        key_inputs: ["传感器", "芯片", "电池系统"]
        key_outputs: ["智能汽车", "充电服务"]
      - 二级分类: "核能与聚变"
        三级赛道: ["核电与小堆", "核聚变与装备"]
        description: "核能与聚变是新能源下游前沿方向，清洁基荷能源"
        key_inputs: ["核燃料", "特种材料"]
        key_outputs: ["核电", "核聚变装置"]
      - 二级分类: "氢能燃料电池"
        三级赛道: ["绿氢与储运"]
        description: "氢能是新能源下游绿色能源方向"
        key_inputs: ["电解槽", "储氢材料"]
        key_outputs: ["绿氢", "燃料电池"]
      - 二级分类: "碳管理与绿色低碳"
        三级赛道: ["碳交易与绿色建筑"]
        description: "碳管理是新能源下游的绿色低碳应用"
        key_inputs: ["碳监测技术", "绿色建材"]
        key_outputs: ["碳交易服务", "绿色建筑"]

  数据要素:
    display_name: "数据要素"
    upstream:
      - 二级分类: "数据安全"
        三级赛道: ["隐私计算与加密"]
        description: "数据安全是数据要素流通的保障基础，隐私计算、密码技术、数据脱敏等"
        key_inputs: ["加密算法", "安全硬件"]
    midstream:
      - 二级分类: "数据资产"
        三级赛道: ["数据资产与基础设施"]
        description: "数据资产确权与交易是核心环节，数据确权、评估、交易平台运营"
        key_inputs: ["数据资源", "安全技术"]
        key_outputs: ["数据产品", "数据服务"]
    downstream:
      - 二级分类: "行业数据"
        三级赛道: ["政务数据", "空间信息", "行业数据资产"]
        description: "数据要素下游覆盖政务数据运营、空间信息服务、行业数据资产化等"
        key_inputs: ["数据产品", "API服务"]
        key_outputs: ["行业数据解决方案"]

  低空经济:
    display_name: "低空经济"
    upstream:
      - 二级分类: "低空基建"
        三级赛道: ["空管与通感", "低空安防", "通感一体化", "动力系统", "低空物流", "维修检测"]
        description: "低空基础设施是产业前提，空管系统、通信导航、监视系统、动力系统等"
        key_inputs: ["通信设备", "导航定位", "雷达"]
    midstream:
      - 二级分类: "eVTOL整机"
        三级赛道: ["eVTOL制造", "工业无人机"]
        description: "eVTOL及无人机制造是产业链核心，整机设计制造与系统集成"
        key_inputs: ["动力系统", "航电系统", "复合材料"]
        key_outputs: ["eVTOL", "工业无人机"]
    downstream:
      - 二级分类: "运营服务"
        三级赛道: []
        description: "低空运营服务覆盖物流配送、空中出行、巡检测绘等"
        key_inputs: ["飞行器", "空域许可"]
        key_outputs: ["低空运输服务", "巡检服务"]

  创新药:
    display_name: "创新药"
    upstream:
      - 二级分类: "产业化平台"
        三级赛道: ["CDMO/CRO"]
        description: "CRO/CDMO是创新药研发生产的基础服务商，提供临床前/临床/工艺开发/生产全链条服务"
        key_inputs: ["分子砌块", "实验动物", "临床资源"]
    midstream:
      - 二级分类: "前沿技术"
        三级赛道: ["ADC/GLP-1", "AI与CGT"]
        description: "ADC/GLP-1等前沿技术平台和AI+CGT是创新药核心研发力量"
        key_inputs: ["CRO/CDMO服务", "靶点发现"]
        key_outputs: ["创新药管线", "临床批件"]
    downstream:
      - 二级分类: "生物制造"
        三级赛道: ["合成生物学", "生物基材料"]
        description: "生物制造是创新药下游的产业化延伸，合成生物学与生物基材料"
        key_inputs: ["生物技术", "发酵工艺"]
        key_outputs: ["生物基产品", "合成生物制品"]

  消费升级:
    display_name: "消费升级"
    upstream:
      - 二级分类: "数字消费"
        三级赛道: ["AI终端制造", "国货品牌"]
        description: "数字消费是消费升级的技术驱动，AI终端制造与国货品牌数字化"
        key_inputs: ["芯片", "传感器", "结构件"]
    midstream:
      - 二级分类: "体验消费"
        三级赛道: ["文旅与智能家电"]
        description: "体验消费是消费升级的核心场景，文旅消费与智能家居家电"
        key_inputs: ["智能硬件", "内容服务"]
        key_outputs: ["消费体验", "智能家电"]
      - 二级分类: "银发经济"
        三级赛道: ["医疗器械与智慧养老", "保健品"]
        description: "银发经济是消费升级的重要赛道，医疗器械、智慧养老与保健品"
        key_inputs: ["传感器", "通信模组", "AI算法"]
        key_outputs: ["家用医疗设备", "康复器械", "健康管理系统"]

  人形机器人:
    display_name: "人形机器人"
    upstream:
      - 二级分类: "核心零部件"
        三级赛道: ["传感器", "微特电机"]
        description: "传感器与微特电机是机器人基础零部件，六维力矩传感器、空心杯电机、线性执行器等"
        key_inputs: ["永磁材料", "芯片", "精密加工"]
    midstream:
      - 二级分类: "核心零部件"
        三级赛道: ["减速器与丝杠"]
        description: "减速器与丝杠是人形机器人核心运动部件，谐波减速器、RV减速器、行星滚柱丝杠等"
        key_inputs: ["齿轮材料", "轴承", "电机"]
        key_outputs: ["关节模组", "减速器总成"]
    downstream:
      - 二级分类: "具身智能"
        三级赛道: ["整机与系统集成"]
        description: "人形机器人整机集成，包含运动控制、AI决策、人机交互等系统"
        key_inputs: ["关节模组", "传感器", "AI芯片"]
        key_outputs: ["人形机器人整机"]
      - 二级分类: "脑机接口"
        三级赛道: ["脑机与康复"]
        description: "脑机接口是人形机器人的前沿交互方向"
        key_inputs: ["神经信号采集", "信号处理算法"]
        key_outputs: ["脑机接口设备", "康复机器人"]