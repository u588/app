# ==================== 2. ThresholdService 专用配置 ====================
# 仅包含阈值动态化策略参数（非服务专属配置）
adaptive_config:
  enabled: true
  
  # ThresholdService 策略配置
  strategies:
    pcr_thresholds:
      enabled: true
      base_thresholds:
        warning_high: 1.3
        warning_low: 0.7
        extreme_high: 1.5
        extreme_low: 0.5
      volatility_adjustment:
        enabled: true
        low_vol_multiplier: 0.9
        high_vol_multiplier: 1.1
        threshold_percentile: 0.7
      market_regime_adjustment:
        enabled: true
        bull_multiplier: 0.9
        bear_multiplier: 1.1
      window_size: 50
    
    micro_liquidity_thresholds:
      enabled: true
      base_thresholds:
        warning_shrink: 0.6
        extreme_shrink: 0.4
      volatility_adjustment:
        enabled: true
        adjustment_range: [0.55, 0.65]
      market_state_adjustment:
        enabled: true
        strategic_defense:
          warning_shrink: 0.7
          extreme_shrink: 0.5
        strategic_offense:
          warning_shrink: 0.55
          extreme_shrink: 0.35
    
    # 商品阈值动态策略
    commodity_thresholds:
      enabled: true
      volatility_adaptive:
        enabled: true
        base_threshold: 10.0
        benchmark_vol: 25.0
      regime_adjustment:
        enabled: true
        bull_market: 0.9
        bear_market: 1.1
    
    # 期权容忍度动态策略
    option_tolerance:
      enabled: true
      base_tolerance: 0.05
      volatility_based:
        enabled: true
        low_vol_tolerance: 0.03
        high_vol_tolerance: 0.08
        threshold_percentile: 0.7
      liquidity_based:
        enabled: true
        high_liquidity_tolerance: 0.04
        low_liquidity_tolerance: 0.06
    
    # 宏观评分动态策略
    macro_scoring:
      enabled: true
      regime_based_adjustment:
        enabled: true
        high_volatility:
          inflation_weight: 0.35
          liquidity_weight: 0.30
          growth_weight: 0.20
          sentiment_weight: 0.10
          external_weight: 0.05
        low_volatility:
          inflation_weight: 0.15
          liquidity_weight: 0.20
          growth_weight: 0.35
          sentiment_weight: 0.15
          external_weight: 0.15

