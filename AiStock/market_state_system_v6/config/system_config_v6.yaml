          warning_low: "积极配置区"
          extreme_low: "警惕通缩风险"
        smoothing_window: 3
      PPI:
        code: "2_PPI"
        name: "工业出厂价格指数"
        direction: "neutral"
        unit: "%"
        thresholds:
          warning_high: 5.0
          warning_low: -3.0
          extreme_high: 8.0
          extreme_low: -5.0
        update_frequency: "monthly"
        lag_type: "leading"
        correlation_with_earnings: 0.75
  
  # 分类 2: 经济增长指标
  growth:
    enabled: true
    weight: 0.25
    description: "经济增长是股市长期向好的基础"
    indicators:
      GDP:
        code: "1_GDPI"
        name: "当季国内生产总值"
        direction: "positive"
        unit: "%"
        thresholds:
          warning_high: 6.0
          warning_low: 4.0
          extreme_high: 8.0
          extreme_low: 2.0
        update_frequency: "quarterly"
        lag_type: "lagging"
        market_state_mapping:
          extreme_high: "战略进攻区"
          warning_high: "积极配置区"
          normal: "均衡持有区"
          warning_low: "防御观望区"
          extreme_low: "战略防御区"
  
  # 分类 3: 流动性指标
  liquidity:
    enabled: true
    weight: 0.25
    description: "流动性是股市短期波动的核心驱动"
    indicators:
      shibor_3m:
        code: "5_SHS3M"
        name: "SHIBOR3月"
        direction: "negative"
        unit: "%"
        thresholds:
          warning_high: 3.5
          warning_low: 1.5
          extreme_high: 5.0
          extreme_low: 1.0
        update_frequency: "daily"
        lag_type: "leading"
        market_state_mapping:
          extreme_high: "战略防御区"
          warning_high: "防御观望区"
          normal: "均衡持有区"
          warning_low: "积极配置区"
          extreme_low: "警惕流动性陷阱"
  
  # 分类 4: 信心/情绪指标
  sentiment:
    enabled: true
    weight: 0.15
    description: "市场情绪是短期波动的放大器"
    indicators:
      consumer_confidence:
        code: "3_CCI"
        name: "消费者信心指数"
        direction: "positive"
        unit: "指数"
        thresholds:
          warning_high: 110
          warning_low: 90
          extreme_high: 120
          extreme_low: 80
        update_frequency: "monthly"
        lag_type: "leading"
        market_state_mapping:
          extreme_high: "警惕过热"
          warning_high: "积极配置区"
          normal: "均衡持有区"
          warning_low: "防御观望区"
          extreme_low: "战略防御区"
  
  # 分类 5: 外部风险指标
  external_risk:
    enabled: true
    weight: 0.15
    description: "外部环境变化影响A股风险偏好"
    indicators:
      us_10y_yield:
        code: "8_ATY"
        name: "美国十年期国债收益率"
        direction: "negative"
        unit: "%"
        thresholds:
          warning_high: 4.5
          warning_low: 3.0
          extreme_high: 5.0
          extreme_low: 2.5
        update_frequency: "daily"
        lag_type: "leading"
        market_state_mapping:
          extreme_high: "战略防御区"
          warning_high: "防御观望区"
          normal: "均衡持有区"
          warning_low: "积极配置区"
          extreme_low: "警惕通缩风险"
        correlation_with_growth_stocks: -0.65
  
  # 分类 6: 基金情绪指标
  fund_sentiment:
    enabled: true
    weight: 0.10
    description: "基金发行和持仓反映机构情绪"
    indicators:
      equity_fund_index:
        code: "9_990002"
        name: "股票型基金指数"
        direction: "positive"
        unit: "指数"
        thresholds:
          warning_high: 110
          warning_low: 90
        update_frequency: "daily"
        lag_type: "coincident"
        institutional_sentiment: true

# ========== 指标间相关性配置 ==========
correlation_matrix:
  # 正相关指标组
  positive_cluster:
    - ["GDP", "industrial_production", "electricity", "fixed_investment"]
    - ["consumer_confidence", "business_confidence", "consumer_expectation"]
    - ["margin_balance", "etf_scale", "north_flow"]
  # 负相关指标组
  negative_cluster:
    - ["shibor_3m", "us_10y_yield"]
    - ["CPI", "equity_fund_index"]
  # 跨市场传导
  cross_market:
    us_10y_yield_to_A_shares: -0.45
    usd_cny_to_north_flow: -0.60
    us_pmi_to_export_sectors: 0.55

# ========== 数据质量配置 ==========
data_quality:
  missing_value_handling: "interpolate"
  outlier_detection:
    enabled: true
    method: "z_score"
    threshold: 3.0
  revision_handling:
    enabled: true
    use_latest: true
    track_revisions: true

# ========== 缓存配置 ==========
cache:
  max_size: 1000
  ttl: 3600

# ========== 输出配置 ==========
output:
  include_component_scores: true
  include_indicator_details: true
  confidence_interval: 0.95
  export_format: ["json", "csv"]
  alert_channels: ["log", "email", "webhook"]

# ========== 可视化配置 ==========
visualization:
  enabled: true
  chinese_font_family: "Microsoft YaHei, SimHei, sans-serif"
  chart_height_default: 600
  chart_width_default: 1200
  color_palette:
    primary: "#3498db"
    success: "#27ae60"
    warning: "#f39c12"
    danger: "#e74c3c"
    info: "#9b59b6"
  export_format: ["html", "png"]
  export_path: "reports/"

# ========== 日志配置 ==========
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file_enabled: true
  file_path: "logs/quant_system.log"
  file_max_size: "10MB"
  file_backup_count: 5

# ========== 性能配置 ==========
performance:
  parallel_loading: true
  max_workers: 5
  cache_enabled: true
  cache_ttl: 3600
  cache_max_size: 1000
  timeout_seconds: 30
  retry_count: 3
  retry_delay_seconds: 2

# ========== 回测配置 ==========
backtest:
  enabled: false
  start_date: "2020-01-01"
  end_date: "2026-02-14"
  rebalance_frequency: "monthly"
  transaction_cost: 0.001
  slippage: 0.0005
  benchmark: "000300"

# ========== 版本信息 ==========
version:
  system_version: "6.1.0"
  config_version: "2.0.0"
  last_updated: "2026-03-04"
  author: "Quant Team"
  notes: "V6.1 标准结构：服务专属配置在根配置层级，ThresholdService 专用配置在 adaptive_config.strategies"