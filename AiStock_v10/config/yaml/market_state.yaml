# ── 市场状态量化子系统配置 ──────────────────────────────
market_state:
  name: "A股市场状态量化"
  version: "10.0"
  
  # 商品信号权重
  commodity_signal_weights:
    momentum: 0.35
    basis: 0.25
    oi_change: 0.20
    volatility: 0.20
  
  # 综合信号权重
  composite_weights:
    commodity: 0.30
    term_structure: 0.15
    index_basis: 0.25
    option_pcr: 0.15
    valuation: 0.10
    macro: 0.05
  
  # 期权PCR权重
  pcr_weights:
    volume_pcr: 0.40
    oi_pcr: 0.40
    skew: 0.20
  
  # PCR阈值
  pcr_thresholds:
    extreme_fear: 0.5
    fear: 0.7
    neutral_low: 0.85
    neutral_high: 1.15
    greed: 1.3
    extreme_greed: 1.5
  
  # 市场状态阈值
  state_thresholds:
    extreme_fear: -0.6
    fear: -0.3
    neutral_low: -0.1
    neutral_high: 0.1
    greed: 0.3
    extreme_greed: 0.6
