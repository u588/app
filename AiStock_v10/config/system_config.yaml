# ============================================
# A股市场状态量化系统 V9.1
# 系统配置文件
# V9.1升级: 商品期权市场码修正 + 广州期权 + tdxAPICode180 + 期权PCR细分
# ============================================

# ==================== 1. 系统级配置 ====================
system:
  version: "9.1.0"
  name: "AiStock V9.1 A股市场状态量化系统"
  mode: "production"
  base_date: null
  log_level: "INFO"
  max_workers: 8
  data_min_days: 500
  degradation_mode: "auto"
  enable_overseas_signal: true
  enable_unified_option_parser: true
  enable_dual_tdx: true

# ==================== 2. TDX双端口配置 ====================
tdx:
  standard:
    host: "180.153.18.170"
    port: 7709
    description: "TDX标准行情端口"
    usage: "A股/指数/基础期货/基础期权"
    use_for:
      - "index_daily"
      - "stock_daily"
      - "index_futures"
      - "etf_options"
      - "cffex_options"
  extension:
    host: "180.153.18.176"
    port: 7721
    description: "TDX扩展行情端口"
    usage: "期货/期权全合约/外盘/宏观指标"
    use_for:
      - "commodity_futures"
      - "commodity_options"
      - "overseas_futures"
      - "macro_indicators"
      - "full_option_chain"
  use_tdx: true
  timeout: 30
  retry_count: 3
  parallel_workers: 5
  auto_fallback: true
  fallback_priority: ["standard", "extension", "database"]

# ==================== 3. 缓存配置 ====================
cache:
  max_size: 2000
  default_ttl: 3600
  ttl:
    stock_daily: 7200
    index_daily: 7200
    index_futures: 1800
    commodity_futures: 900
    etf_options: 1800
    cffex_options: 1800
    commodity_options: 1800
    overseas_futures: 3600
    macro_indicators: 14400
    pe_data: 86400
    cftc_position: 86400
    lme_inventory: 86400
    bond_yield: 7200
    qvix: 1800
    eia_data: 86400
    ism_pmi: 86400
    global_indices: 3600
    pcr_full: 1800
    option_chain: 900
  key_format: "{data_type}_{code}_{date}"
  enable_compression: true

# ==================== 4. 合约动态推导配置 ====================
contract_manager:
  enabled: true
  code_table_path: "./data/tdxAPICode180.xlsx"
  auto_rollover: true
  expiry_warning_days: 5
  near_month_strategy: "auto"
  far_month_offset: 1
  rollover_day: 15
  unified_option_parser:
    enabled: true
    total_markets: 11
    total_contracts: 57371
    market_codes:
      shanghai_etf: 8
      shenzhen_etf: 9
      cffex_index: 7
      shfe_commodity: 1
      dce_commodity: 29
      czce_commodity: 28
      gfex_commodity: 66
      shfe_option: 6
      dce_option: 5
      czce_option: 4
      gfex_option: 67
    code_pattern: "^(\\d{6,8})[CP](\\d{2,5})$"
    strike_normalization: true
    expiry_detection: "contract_suffix"
  dynamic_contract:
    enabled: true
    max_contracts_per_underlying: 80
    volume_rank_threshold: 3
    oi_filter_min: 100

