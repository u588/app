# ==================== 6. 辅助数据源配置 ====================
auxiliary_data_sources:
  cftc_position:
    enabled: true
    ak_function: "futures_foreign_cftc"
    description: "CFTC持仓报告(投机净多头)"
    cache_ttl: 86400
    update_frequency: "weekly"
    key_symbols: ["CL", "GC", "SI", "HG", "S", "CT", "NG"]
    position_threshold:
      extreme_long: 0.80
      extreme_short: 0.20
      neutral_range: [0.40, 0.60]
  lme_inventory:
    enabled: true
    ak_function: "futures_lme_inventory"
    description: "LME有色金属库存"
    cache_ttl: 86400
    update_frequency: "daily"
    metals: ["CU", "AL", "ZN", "PB", "NI", "SN"]
    inventory_change_threshold:
      significant: 5.0
      extreme: 10.0
  bond_yields:
    enabled: true
    ak_function_cn: "bond_china_yield"
    ak_function_us: "macro_bond_yield_us"
    description: "中美债券收益率"
    cache_ttl: 7200
    update_frequency: "daily"
    keys:
      cn_10y: "10年期国债收益率"
      us_10y: "美国10年期国债收益率"
      cn_us_spread: "中美利差"
    spread_warning: -1.0
    spread_extreme: -1.5
  qvix:
    enabled: true
    ak_function: "index_option_50etf_qvix"
    description: "中国期权隐含波动率指数"
    cache_ttl: 1800
    update_frequency: "realtime"
    thresholds:
      low_vol: 15.0
      normal_vol: 25.0
      high_vol: 35.0
      extreme_vol: 50.0
    pcr_adjustment_factor: 0.15
  eia_crude:
    enabled: true
    ak_function: "futures_energy_eia"
    description: "EIA原油库存数据"
    cache_ttl: 86400
    update_frequency: "weekly"
    report_day: "wednesday"
    inventory_change_threshold:
      draw_warning: -5.0
      build_warning: 5.0
      extreme_draw: -10.0
      extreme_build: 10.0
    a_share_impact: ["石油石化", "化工"]
  ism_pmi:
    enabled: true
    ak_function: "macro_usa_ism_pmi"
    description: "ISM制造业PMI"
    cache_ttl: 86400
    update_frequency: "monthly"
    thresholds:
      expansion: 50.0
      strong_expansion: 55.0
      contraction_warning: 48.0
      deep_contraction: 45.0
    a_share_impact: ["出口导向", "制造业"]
  global_indices:
    enabled: true
    description: "全球主要指数行情"
    cache_ttl: 3600
    update_frequency: "realtime"
    indices:
      sp500:
        ak_function: "index_us_stock_sina"
        code: ".INX"
        name: "标普500"
      nasdaq:
        ak_function: "index_us_stock_sina"
        code: ".IXIC"
        name: "纳斯达克"
      dji:
        ak_function: "index_us_stock_sina"
        code: ".DJI"
        name: "道琼斯"
      hsi:
        ak_function: "stock_hk_index_daily_sina"
        code: "HSI"
        name: "恒生指数"
      n225:
        ak_function: "stock_japan_index_sina"
        code: "N225"
        name: "日经225"
      dax:
        ak_function: "index_euro_stoxx50_sina"
        code: "DAX"
        name: "德国DAX"
      ftse:
        ak_function: "index_uk_ftse_sina"
        code: "FTSE"
        name: "英国富时100"
    correlation_window: 60

