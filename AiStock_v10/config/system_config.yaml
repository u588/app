    stock_etf: 0.40
    cffex: 0.35
    commodity: 0.25

# ==================== 11. 外盘信号引擎(V8四维体系) ====================
overseas_signal_engine:
  enabled: true
  dimensions:
    price:
      weight: 0.40
      description: "价格信号维度"
      sub_signals:
        trend_20d:
          weight: 0.30
          window: 20
          method: "momentum"
          thresholds:
            strong_up: 5.0
            up: 2.0
            down: -2.0
            strong_down: -5.0
        trend_60d:
          weight: 0.25
          window: 60
          method: "momentum"
          thresholds:
            strong_up: 10.0
            up: 5.0
            down: -5.0
            strong_down: -10.0
        ma_cross:
          weight: 0.20
          fast_period: 20
          slow_period: 60
          method: "golden_cross"
        rsi_14:
          weight: 0.15
          period: 14
          thresholds:
            overbought: 70
            oversold: 30
        breakout:
          weight: 0.10
          window: 20
          method: "bollinger"
          multiplier: 2.0
    position:
      weight: 0.25
      description: "持仓信号维度(CFTC)"
      sub_signals:
        net_long_ratio:
          weight: 0.40
          source: "cftc"
          thresholds:
            extreme_long: 0.80
            extreme_short: 0.20
            neutral_high: 0.60
            neutral_low: 0.40
        position_change_4w:
          weight: 0.30
          window: 4
          method: "momentum"
          thresholds:
            large_increase: 10.0
            large_decrease: -10.0
        oi_trend:
          weight: 0.30
          window: 20
          method: "trend"
          thresholds:
            increasing: 5.0
            decreasing: -5.0
    macro:
      weight: 0.20
      description: "宏观信号维度"
      sub_signals:
        dollar_index:
          weight: 0.25
          source: "DX"
          method: "inverse_correlation"
          thresholds:
            strong_dollar: 105.0
            weak_dollar: 95.0
        bond_yield_spread:
          weight: 0.25
          source: "cn_us_bond_spread"
          thresholds:
            wide_spread: 2.0
            narrow_spread: -1.0
            inverted: -1.5
        inventory_signal:
          weight: 0.25
          source: "lme_inventory"
          method: "inverse"
          thresholds:
            significant_drawdown: -5.0
            significant_buildup: 5.0
        pmi_signal:
          weight: 0.25
          source: "ism_pmi"
          thresholds:
            expansion: 50.0
            strong_expansion: 55.0
            contraction: 48.0
    sentiment:
      weight: 0.15
      description: "情绪信号维度"
      sub_signals:
        vix_proxy:
          weight: 0.30
          source: "qvix"
          thresholds:
            low_fear: 15.0
            moderate_fear: 25.0
            high_fear: 35.0
            extreme_fear: 50.0
        futures_contango:
          weight: 0.25
          method: "term_structure"
          thresholds:
            deep_contango: 5.0
            backwardation: -2.0
        safe_haven_flow:
          weight: 0.25
          source: "GC"
          method: "correlation_break"
          thresholds:
            flight_to_safety: 2.0
          correlated_assets: ["DX", "TN"]
        sentiment_momentum:
          weight: 0.20
          window: 10
          method: "composite"
  aggregation:
    method: "weighted_sum"
    normalize: true
    score_range: [-100, 100]
    signal_decay: 0.95
  tier_weights:
    core: 0.50
    extended: 0.30
    auxiliary: 0.20

# ==================== 12. 市场Regime配置 ====================
market_regime:
  enabled: true
  confirmation_days: 3
  volatility_window: 60
  momentum_window: 20
  volume_window: 20
  regimes:
    bull:
      volatility_threshold: 0.15
      momentum_threshold: 0.05
      volume_trend: "increasing"
      description: "牛市"
    bear:
      volatility_threshold: 0.30
      momentum_threshold: -0.05
      volume_trend: "decreasing"
      description: "熊市"
    volatile:
      volatility_threshold: 0.25
      momentum_range: [-0.02, 0.02]
      volume_trend: "neutral"
      description: "震荡市"
    recovery:
      volatility_decreasing: true
      momentum_positive: true
      volume_trend: "increasing"
      description: "复苏期"
  overseas_regime_adjustment:
    enabled: true
    weight: 0.20
    bear_amplification: 1.3
    bull_suppression: 0.9

