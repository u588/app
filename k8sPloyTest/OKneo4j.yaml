apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-deployment
spec:
  selector:
    matchLabels:
      app: neo4j
  replicas: 2 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: 10.3.18.63/docker/neo4j
        ports:
        - containerPort: 7474
        - containerPort: 7687

---
apiVersion: v1
kind: Service
metadata:
   name: neo4j-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.1.1
   selector:
      app: neo4j
   ports:
   - name: neo4j-http
     protocol: TCP
     port: 7474
     targetPort: 7474
   - name: neo4j-bolt
     protocol: TCP
     port: 7687
     targetPort: 7687
