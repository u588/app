apiVersion: apps/v1
kind: Deployment
metadata:
  name: testscr-deployment
spec:
  selector:
    matchLabels:
      app: testscr
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: testscr
    spec:
      containers:
      - name: testscr
        image: 10.3.18.60/docker/tdx-scrape:v2
        volumeMounts:
        - mountPath: /home 
          name: home



      volumes:
      - name: home
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/Scrap
          readOnly: false
