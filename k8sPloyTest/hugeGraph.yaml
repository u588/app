apiVersion: apps/v1
kind: Deployment
metadata:
  name: huge-deployment
spec:
  selector:
    matchLabels:
      app: huge
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: huge
    spec:
      containers:
      - name: huge
        image: 10.3.18.60/docker/hugegraph:latest
        ports: 
        - containerPort: 8080
        volumeMounts:
        - mountPath: /hugegraph/conf
          name: conf
          
      - name: hubble
        image: 10.3.18.60/docker/hugegraph-hubble:latest
        ports:
        - containerPort: 8088

      volumes:
      - name: conf
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/HugeGraph/conf
          readOnly: false
---
apiVersion: v1
kind: Service
metadata:
   name: huge-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.18.1.6
   selector:
      app: huge
   ports:
   - name: huge-http
     protocol: TCP
     port: 8080
     targetPort: 8080
   - name: hubble-http
     protocol: TCP
     port: 80
     targetPort: 8088