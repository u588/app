apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-deployment
spec:
  selector:
    matchLabels:
      app: selenium
  replicas: 1 # 告知 Deployment 运行 2 个与该模板匹配的 Pod password secret
  template:
    metadata:
      labels:
        app: selenium
    spec:
      containers:
      - name: selenium
        image: 10.3.18.60/docker/selenium
        env:
          - name: shm-size
            value: 2g
        ports:
        - containerPort: 4444
        - containerPort: 7900

---
apiVersion: v1
kind: Service
metadata:
   name: selenium-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.18.1.3
   selector:
      app: selenium
   ports:
   - name: selenium-driver
     protocol: TCP
     port: 11111
     targetPort: 4444
   - name: selenium-vnc
     protocol: TCP
     port: 80
     targetPort: 7900
