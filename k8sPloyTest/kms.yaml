apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms-deployment
spec:
  selector:
    matchLabels:
      app: kms
  replicas: 2 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: kms
    spec:
      containers:
      - name: kms
        image: 10.3.18.63/docker/kms
        ports:
        - containerPort: 1688


---
apiVersion: v1
kind: Service
metadata:
   name: kms-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.88.1.8
   selector:
      app: kms
   ports:
   - name: kms-port
     protocol: TCP
     port: 1688
     targetPort: 1688
