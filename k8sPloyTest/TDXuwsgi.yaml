apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdxuwsgi-deployment
spec:
  selector:
    matchLabels:
      app: tdxuwsgi
  replicas: 2 # 告知 Deployment 运行 2 个与该模板匹配的 Pod
  template:
    metadata:
      labels:
        app: tdxuwsgi
    spec:
      containers:
      - name: tdxuwsgi
        image: 10.3.18.60/docker/tdx-uwsgi:v1
        # ports:
        # - containerPort: 3031
        volumeMounts:
        - mountPath: /home 
          name: uhome
      - name: nginx
        image: 10.3.18.60/docker/nginx:v1
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /etc/nginx/conf.d
          name: conf
        - mountPath: /home 
          name: nhome
        - mountPath: /var/log/nginx
          name: log

      volumes:
      - name: uhome
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/www
          readOnly: false
      - name: conf
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/nginx/conf
          readOnly: true
      - name: nhome
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/nginx/assets
          readOnly: true
      - name: log
        nfs:
          server: 10.145.254.55
          path: /home/nfsroot/nginx/log
          readOnly: false   
        
---
apiVersion: v1
kind: Service
metadata:
   name: tdxuwsgi-svc
   namespace: default
spec:
   type: ClusterIP
   clusterIP: 10.18.8.8
   selector:
      app: tdxuwsgi
   ports:
   - name: tdxuwsgi-server
     protocol: TCP
     port: 80
     targetPort: 80