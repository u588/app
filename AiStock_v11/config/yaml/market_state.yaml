# ── 市场状态量化子系统配置 (V11 7分量模型) ─────────────
market_state:
  name: "A股市场状态量化"
  version: "11.1"

  # 商品信号权重
  commodity_signal_weights:
    momentum: 0.35
    basis: 0.25
    oi_change: 0.20
    volatility: 0.20

  # ═══ V11 7分量综合信号权重 ═══
  # commodity(0.20) + term_structure(0.08) + index_basis(0.15)
  # + fund_flow(0.15) + option_pcr(0.12) + macro_valuation(0.10)
  # + style_rotation(0.20)
  composite_weights:
    commodity: 0.20
    term_structure: 0.08
    index_basis: 0.15
    fund_flow: 0.15
    option_pcr: 0.12
    macro_valuation: 0.10
    style_rotation: 0.20

  # ── 基金资金流权重 (V11 NEW) ──────────────────────────
  fund_flow_weights:
    margin: 0.25
    etf_scale: 0.20
    stock_bond_rotation: 0.25
    active_passive: 0.15
    fund_momentum: 0.15

  # ── 宏观估值权重 (V11 NEW) ────────────────────────────
  macro_valuation_weights:
    pmi: 0.20
    credit: 0.20
    liquidity: 0.20
    inflation: 0.10
    valuation: 0.30

  # 期权PCR权重
  pcr_weights:
    volume_pcr: 0.40
    oi_pcr: 0.40
    skew: 0.20

  # PCR阈值 (V11修正: 阈值命名与PCR含义对齐)
  # PCR < 1.0 → 看涨多于看跌 → 市场偏贪婪
  # PCR > 1.0 → 看跌多于看涨 → 市场偏恐惧
  pcr_thresholds:
    extreme_greed: 0.5     # PCR <= 0.5 → 极端贪婪 (反向看空)
    greed: 0.7             # PCR <= 0.7 → 贪婪 (看涨偏多)
    neutral_low: 0.85     # PCR 中性区间下界
    neutral_high: 1.15    # PCR 中性区间上界
    fear: 1.3              # PCR >= 1.3 → 恐惧 (看跌偏多)
    extreme_fear: 1.5     # PCR >= 1.5 → 极端恐惧 (反向看多)

  # PCR标的列表 (用于PCR计算, ETF类)
  pcr_underlyings:
    - "510050"
    - "510300"

  # ── 风格轮动权重 (V11 NEW) ────────────────────────────
  style_rotation_weights:
    industry: 0.35      # 行业轮动权重
    style: 0.35         # 风格(成长/价值)轮动权重
    size: 0.30          # 规模(大/小盘)轮动权重

  # ── 轮动预警阈值 (V11 NEW) ────────────────────────────
  rotation_alert_thresholds:
    style_ratio_change_5d: 0.03    # 成长/价值比值5日变化>3%触发预警
    size_ratio_change_5d: 0.03     # 大/小盘比值5日变化>3%触发预警
    industry_spread: 15.0          # 行业动量极差>15触发轮动预警

  # 市场状态阈值
  state_thresholds:
    extreme_fear: -0.6
    fear: -0.3
    neutral_low: -0.1
    neutral_high: 0.1
    greed: 0.3
    extreme_greed: 0.6
