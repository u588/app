  # ── 海外期货配置 ──────────────────────────────────────────
  # V11修正: 与 ak_adapter.py FUTURES_SYMBOL_MAP 对齐
  # V11修复: akshare 1.18.x API变更, ak_code 从中文代码改为英文短代码
  #   旧: WTI原油/COMEX黄金/布伦特原油 → 新: CL/GC/OIL (symbol = ak_code)
  # CORE层(8):   CL,OIL,GC,XAU,SI,XAG,NG,HG — 流动性最高,始终加载
  # EXTENDED层(12): C,W,S,BO,SM,CT,RS,CAD,LHC,AHD,EUA,FEF — 重要商品,按需加载
  # AUXILIARY层(9): NID,PBD,SND,XPT,XPD,FCPO,RSS3,BTC,ZSD — 低频辅助
  # 注: 留空则使用 ak_adapter.py 内置默认值 (推荐)
  overseas:
    # core_symbols 留空 → 使用 FUTURES_SYMBOL_MAP 内置8个CORE品种
    # 如需覆盖, 取消下行注释 (必须全部为 FUTURES_SYMBOL_MAP 中存在的 symbol):
    # core_symbols: "CL,OIL,GC,XAU,SI,XAG,NG,HG"
    core_symbols: null
    # extended_symbols 留空 → 使用 FUTURES_SYMBOL_MAP 内置12个EXTENDED品种
    # 如需覆盖, 取消下行注释:
    # extended_symbols: "C,W,S,BO,SM,CT,RS,CAD,LHC,AHD,EUA,FEF"
    extended_symbols: null
    auxiliary_types:
      - "cftc"
      - "lme_stock"
      - "lme_holding"
      - "bond_zh_us"
      - "bond_us_10y"
      - "eia_crude"
      - "ism_pmi"
      - "global_index"
      # 注: qvix_50etf / qvix_300etf 已知不稳定, 按需启用
      # - "qvix_50etf"
      # - "qvix_300etf"

  # ── 宏观指标配置 ──────────────────────────────────────────
  # V11修正: Market 50 (标准TDX端口) 不支持 CPI/PPI/PMI 代码
  # 正确数据源: Market 38 (TDX扩展端口), 使用 2_CPI/2_PPI/3_PMI 格式
  # 注: 此段供 DataLoaderService.macro_data 数据段使用
  #     MacroValuationEngine 使用 codes.macro_valuation.macro_indicators (更完整)
  macro:
    indicators:
      - code: "2_CPI"
        market: 38
        name: "CPI同比"
        sub_signal: "cpi"
      - code: "2_PPI"
        market: 38
        name: "PPI同比"
        sub_signal: "ppi"
      - code: "3_PMI"
        market: 38
        name: "制造业PMI"
        sub_signal: "pmi"

  # ── 估值数据配置 ──────────────────────────────────────────
  valuation:
    codes: ["000300", "000905", "000852"]
    days: 100

  # ── 资金流配置 (V11.5 重新激活) ──────────────────────
  # FundFlowEngine 基于TDX成交量数据, 不使用 akshare fund flow 接口
  fund_flow:
    # 大盘指数 (用于资金流方向判断)
    large_cap_codes: ["000300", "000016"]
    # 小盘指数 (用于大小盘轮动判断)
    small_cap_codes: ["000852", "399006"]
    # 股指期货代码 (用于杠杆资金活跃度判断)
    futures_codes: ["IFL8", "IML8"]

  # ── 宏观估值配置 (V11 NEW) ──────────────────────────────
  # TDX扩展接口 Market 38 宏观指标 + PostgreSQL估值数据
  macro_valuation:
    macro_indicators:
      - code: "3_PMI"
        market: 38
        name: "制造业PMI"
        sub_signal: "pmi"
      - code: "3_PMIH"
        market: 38
        name: "非制造业PMI"
        sub_signal: "pmih"
      - code: "5_TRY"
        market: 38
        name: "社融存量同比"
        sub_signal: "social_finance"
      - code: "5_TRL"
        market: 38
        name: "人民币贷款同比"
        sub_signal: "loan"
      - code: "5_CNTY"
        market: 38
        name: "央行外汇占款"
        sub_signal: "fx_occupation"
      - code: "5_SHS3M"
        market: 38
        name: "Shibor3M"
        sub_signal: "shibor_3m"
      - code: "8_ATY"
        market: 38
        name: "美国十年国债"
        sub_signal: "us_10y"
      - code: "2_CPI"
        market: 38
        name: "CPI同比"
        sub_signal: "cpi"
      - code: "2_PPI"
        market: 38
        name: "PPI同比"
        sub_signal: "ppi"
