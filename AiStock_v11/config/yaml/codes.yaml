      liquidity: 0.20
      inflation: 0.10
      valuation: 0.30

  # ── 合约滚动配置 ──────────────────────────────────────────
  contract_rollover:
    rollover_day: 15
    expiry_warning_days: 5

  # ── 缓存TTL配置 (秒) ────────────────────────────────────
  cache_ttl:
    index_data: 300
    futures_data: 120
    option_data: 120
    overseas_futures: 60
    auxiliary_data: 1800
    valuation_data: 3600
    macro_data: 3600
    # ─── V11 数据段TTL ─────────────────────────────────────────
    macro_valuation_data: 3600   # 宏观估值: 1小时 (月频为主)
    style_rotation_data: 300     # 风格轮动: 5分钟 (日频指数)
    # ─── V11.5 NEW 数据段TTL ──────────────────────────────────
    industry_pe_data: 3600       # 行业PE数据: 1小时 (日频)

  # ── 行业PE估值配置 (V11.5 NEW) ──────────────────────────
  # 用于 StyleRotationEngine 估值双因子
  industry_pe:
    codes: ["932083", "932077", "932078", "932079", "932080", "932081", "932082", "932084", "932085", "932086"]
    days: 2500          # PE百分位计算所需历史数据量
    percentile_window: 2500

  # ── 行业/风格/规模轮动配置 (V11 NEW) ──────────────────
  # 数据源: tdxIndexsRAW.xlsx, 全指行业系列(EX,MC=62) + 成长/价值风格对 + 大中小盘规模
  # ST=标准接口, EX=扩展接口(MarketCode=62需用扩展端口)
  style_rotation:
    # ── 行业轮动: 中证全指行业系列 (10行业全覆盖) ──
    # 优选逻辑: 全指行业(MarketCode=62)覆盖全A股, 成分股最多, 代表性最强
    industry_indices:
      - code: "932083"
        market: 62
        market_type: "index_ext"
        name: "全指金融行业"
        industry: "finance"
      - code: "932077"
        market: 62
        market_type: "index_ext"
        name: "全指能源行业"
        industry: "energy"
      - code: "932078"
        market: 62
        market_type: "index_ext"
        name: "全指材料行业"
        industry: "materials"
      - code: "932079"
        market: 62
        market_type: "index_ext"
        name: "全指工业行业"
        industry: "industrials"
      - code: "932080"
        market: 62
        market_type: "index_ext"
        name: "全指可选行业"
        industry: "discretionary"
      - code: "932081"
        market: 62
        market_type: "index_ext"
        name: "全指消费行业"
