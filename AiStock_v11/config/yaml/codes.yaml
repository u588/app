      - code: "932082"
        market: 62
        market_type: "index_ext"
        name: "全指医药行业"
        industry: "healthcare"
      - code: "932084"
        market: 62
        market_type: "index_ext"
        name: "全指信息行业"
        industry: "info_tech"
      - code: "932085"
        market: 62
        market_type: "index_ext"
        name: "全指通信行业"
        industry: "telecom"
      - code: "932086"
        market: 62
        market_type: "index_ext"
        name: "全指公用行业"
        industry: "utilities"
    # ── 风格轮动: 成长/价值对 ──
    # 优选逻辑: 300成长/价值(EX,跨沪深)为主, 国证成长/价值(ST,深市)为辅, 交叉验证
    style_indices:
      - code: "000918"
        market_type: "index_sh"
        name: "300成长"
        role: "growth"
      - code: "000919"
        market_type: "index_sh"
        name: "300价值"
